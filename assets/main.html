      ctx.stroke();
    }
    // HP bar background — shields show a big HP bar
    const hpRatio = Math.max(0, ball.hp / ball.maxHp);
    const bw = ball.radius * 2.6;
    ctx.fillStyle = '#333333';
    ctx.fillRect(ball.x - bw/2, ball.y + ball.radius + 4, bw, 6);
    ctx.fillStyle = ball.isEmergencyShield
      ? '#ff0000'
      : hpRatio > 0.5 ? '#4499ff' : hpRatio > 0.25 ? '#ffaa00' : '#ff3333';
    ctx.fillRect(ball.x - bw/2, ball.y + ball.radius + 4, bw * hpRatio, 6);
    // Shield body
    drawShield(ball);
    // Shield label
    ctx.fillStyle = ball.isEmergencyShield ? '#ff4444' : ball.isEliteKingShield ? '#ffdd44' : ball.isMlvlShield ? '#aa44ff' : '#ffffff';
    ctx.font = `bold ${Math.max(8, ball.radius * 0.4)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ball.isEmergencyShield ? 'LAST STAND!' : ball.isEliteKingShield ? 'ROYAL' : ball.isMlvlShield ? 'REFLECT' : 'SHIELD', ball.x, ball.y + ball.radius + 16);
  });

  // ---- CANNONS ----
  balls.filter(b => b.isCannon).forEach(ball => {
    // Range indicator circle — shows attack range
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, CANNON_RANGE, 0, Math.PI * 2);
    ctx.strokeStyle = ball.color + '22';
    ctx.lineWidth   = 1;
    ctx.stroke();

    // ---- LEVEL 2 CANNON VISUALS ----
    if (ball.ballLevel >= 2) {
      // Gold ring shows upgrade
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 6, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffdd44cc';
      ctx.lineWidth   = 3;
      ctx.stroke();
      // HP bar since it now has knight HP
      const bw2  = ball.radius * 2.4;
      const hpR2 = Math.max(0, ball.hp / ball.maxHp);
      ctx.fillStyle = '#333333';
      ctx.fillRect(ball.x - bw2/2, ball.y + ball.radius + 4, bw2, 4);
      ctx.fillStyle = hpR2 > 0.5 ? '#44ff44' : hpR2 > 0.25 ? '#ffaa00' : '#ff3333';
      ctx.fillRect(ball.x - bw2/2, ball.y + ball.radius + 4, bw2 * hpR2, 4);
      // Cooldown bar — shows time until next shot
      const cdRatio = Math.min(1, ball.attackTimer / 10000);
      ctx.fillStyle = '#333333';
      ctx.fillRect(ball.x - bw2/2, ball.y + ball.radius + 10, bw2, 3);
      ctx.fillStyle = '#ffdd44';
      ctx.fillRect(ball.x - bw2/2, ball.y + ball.radius + 10, bw2 * cdRatio, 3);
    }
    // Fire flash when shooting
    if (ball.lastFired) {
      if (ball.lastMissed) {
        // Miss — gray puff
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius + 8, 0, Math.PI * 2);
        ctx.fillStyle = '#88888866';
        ctx.fill();
        ctx.fillStyle    = '#cccccc';
        ctx.font         = `bold ${Math.max(9, ball.radius * 0.7)}px Arial`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('MISS!', ball.x, ball.y - ball.radius - 12);
      } else {
        // Hit — yellow flash
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius + 10, 0, Math.PI * 2);
        ctx.fillStyle = '#ffff0066';
        ctx.fill();
        ctx.fillStyle    = '#ffff00';
        ctx.font         = `bold ${Math.max(9, ball.radius * 0.7)}px Arial`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('BOOM!', ball.x, ball.y - ball.radius - 12);
      }
    }
    drawCannon(ball);
    // Label — 1HP for normal, MLVL for upgraded
    ctx.fillStyle    = ball.ballLevel >= 2 ? '#ffdd44' : '#ff4444';
    ctx.font         = `bold ${Math.max(8, ball.radius * 0.5)}px Arial`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ball.ballLevel >= 2 ? 'MLVL' : '1HP', ball.x, ball.y + ball.radius + 20);
  });

  // ---- RAMMERS ----
  balls.filter(b => b.isRammer).forEach(ball => {
    // MLVL rammer gold ring
    if (ball.isMlvlRammer) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 7, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffdd44cc';
      ctx.lineWidth   = 3;
      ctx.stroke();
    }
    // Speed lines when charging at target
    if (ball.currentRamTarget) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 8, 0, Math.PI * 2);
      ctx.strokeStyle = ball.color + 'aa';
      ctx.lineWidth   = 3;
      ctx.stroke();
    }
    drawRammer(ball);
    // RAM / RAM MLVL label
    ctx.fillStyle    = ball.isMlvlRammer ? '#ffdd44' : '#ffffff';
    ctx.font         = `bold ${Math.max(8, ball.radius * 0.45)}px Arial`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ball.isMlvlRammer ? 'RAM MLVL' : 'RAM', ball.x, ball.y + ball.radius + 12);
    // HP bar
    const bw  = ball.radius * 2.2;
    const hpR = Math.max(0, ball.hp / ball.maxHp);
    ctx.fillStyle = '#333333';
    ctx.fillRect(ball.x - bw/2, ball.y + ball.radius + 18, bw, 4);
    ctx.fillStyle = hpR > 0.5 ? '#44ff44' : hpR > 0.25 ? '#ffaa00' : '#ff3333';
    ctx.fillRect(ball.x - bw/2, ball.y + ball.radius + 18, bw * hpR, 4);
  });

  // ---- HORSE KNIGHTS ----
  balls.filter(b => b.isHorse).forEach(ball => {
    // Charge trail when targeting cannon
    if (ball.horseTarget) {
      ctx.beginPath();
      ctx.moveTo(ball.trailX, ball.trailY);
      ctx.lineTo(ball.x, ball.y);
      ctx.strokeStyle = ball.color + '66';
      ctx.lineWidth = 3;
      ctx.stroke();
    }
    // Kingdom color underneath
    ctx.save();
    ctx.translate(ball.x, ball.y);
    ctx.beginPath();
    ctx.arc(0, 0, ball.radius * 0.88, 0, Math.PI * 2);
    ctx.fillStyle = ball.color;
    ctx.fill();
    ctx.drawImage(horseImg, -ball.radius * 1.2, -ball.radius * 1.2, ball.radius * 2.4, ball.radius * 2.4);
    ctx.restore();
    // HP bar
    const hpR = Math.max(0, ball.hp / ball.maxHp);
    const bw  = ball.radius * 2.4;
    ctx.fillStyle = '#333333';
    ctx.fillRect(ball.x - bw/2, ball.y + ball.radius + 4, bw, 4);
    ctx.fillStyle = hpR > 0.5 ? '#44ff44' : hpR > 0.25 ? '#ffaa00' : '#ff3333';
    ctx.fillRect(ball.x - bw/2, ball.y + ball.radius + 4, bw * hpR, 4);
    // Label
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${Math.max(8, ball.radius * 0.45)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🐴', ball.x, ball.y);
    // Level badge
    const lx = ball.x - ball.radius * 0.55, ly = ball.y - ball.radius * 0.85;
    const lr = Math.max(7, ball.radius * 0.38);
    ctx.beginPath(); ctx.arc(lx, ly, lr, 0, Math.PI*2);
    ctx.fillStyle = ball.color; ctx.fill();
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.2; ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${Math.floor(lr)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ball.ballLevel, lx, ly);
  });

  // ---- HOOKERS ----
  balls.filter(b => b.isHooker).forEach(ball => {
    // Draw chain line to hooked target
    if (ball.hookedTarget && ball.hookedTarget.hp > 0) {
      ctx.beginPath();
      ctx.moveTo(ball.x, ball.y);
      ctx.lineTo(ball.hookedTarget.x, ball.hookedTarget.y);
      ctx.strokeStyle = ball.color + 'cc';
      ctx.lineWidth   = 2.5;
      ctx.setLineDash([6, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    // Body — hooker.png directly, no color circle
    const hSize = ball.radius * 2.4;
    ctx.save();
    ctx.translate(ball.x, ball.y);
    ctx.drawImage(hookerImg, -hSize/2, -hSize/2, hSize, hSize);
    ctx.restore();
    // HOOKER label in kingdom color instead of color circle
    ctx.fillStyle = ball.color;
    ctx.font = `bold ${Math.max(9, ball.radius * 0.5)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('HOOKER', ball.x, ball.y - ball.radius - 12);
    // Sword pointing north — sword.png (small, proportional to unit)
    const sSize = ball.radius * 0.8;
    ctx.save();
    ctx.translate(ball.x - ball.radius * 0.4, ball.y - ball.radius - sSize * 0.5);
    ctx.rotate(-Math.PI / 2);
    ctx.drawImage(swordImg, -sSize/2, -sSize/2, sSize, sSize);
    ctx.restore();
    // Hook symbol
    ctx.fillStyle = '#ff8800';
    ctx.font = `bold ${Math.max(10, ball.radius * 0.6)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🪝', ball.x, ball.y + 2);
    // HP bar
    const hpR = Math.max(0, ball.hp / ball.maxHp);
    const bw  = ball.radius * 2.4;
    ctx.fillStyle = '#333333';
    ctx.fillRect(ball.x - bw/2, ball.y + ball.radius + 4, bw, 5);
    ctx.fillStyle = hpR > 0.5 ? '#44ff44' : hpR > 0.25 ? '#ffaa00' : '#ff3333';
    ctx.fillRect(ball.x - bw/2, ball.y + ball.radius + 4, bw * hpR, 5);
    // Label
    ctx.fillStyle = '#ff8800';
    ctx.font = `bold ${Math.max(8, ball.radius * 0.45)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('HOOK', ball.x, ball.y + ball.radius + 16);
    // Level badge
    const lx = ball.x - ball.radius * 0.55, ly = ball.y - ball.radius * 0.85;
    const lr = Math.max(7, ball.radius * 0.38);
    ctx.beginPath(); ctx.arc(lx, ly, lr, 0, Math.PI*2);
    ctx.fillStyle = '#ff8800'; ctx.fill();
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.2; ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${Math.floor(lr)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ball.ballLevel, lx, ly);
  });

  // ---- WIZARDS ----
  balls.filter(b => b.isWizard).forEach(ball => {
    // Freeze beam — blue line to freeze target
    if (ball.wizardFreezeTarget) {
      ctx.beginPath();
      ctx.moveTo(ball.x, ball.y);
      ctx.lineTo(ball.wizardFreezeTarget.x, ball.wizardFreezeTarget.y);
      ctx.strokeStyle = '#44aaff';
      ctx.lineWidth   = 3;
      ctx.setLineDash([4, 3]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle    = '#44aaff';
      ctx.font         = `bold ${Math.max(9, ball.radius * 0.55)}px Arial`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('FREEZE!', ball.x, ball.y - ball.radius - 14);
    }
    // Fireball beam — red/orange line to fire target
    if (ball.wizardFireTarget) {
      ctx.beginPath();
      ctx.moveTo(ball.x, ball.y);
      ctx.lineTo(ball.wizardFireTarget.x, ball.wizardFireTarget.y);
      ctx.strokeStyle = '#ff6600';
      ctx.lineWidth   = 3;
      ctx.stroke();
      // Fireball impact flash
      ctx.beginPath();
      ctx.arc(ball.wizardFireTarget.x, ball.wizardFireTarget.y, ball.wizardFireTarget.radius + 8, 0, Math.PI * 2);
      ctx.fillStyle = '#ff660055';
      ctx.fill();
      ctx.fillStyle    = '#ff4400';
      ctx.font         = `bold ${Math.max(9, ball.radius * 0.55)}px Arial`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('FIREBALL!', ball.x, ball.y - ball.radius - 14);
    }
    // Wizard body — wizard.png
    const wSize = ball.radius * 2.6;
    ctx.save();
    ctx.translate(ball.x, ball.y);
    ctx.drawImage(wizardImg, -wSize/2, -wSize/2, wSize, wSize);
    ctx.restore();
    // Next ability indicator
    const nextAbility = ball.wizardAbilityIndex === 0 ? '❄️' : '🔥';
    ctx.fillStyle    = ball.wizardAbilityIndex === 0 ? '#44aaff' : '#ff6600';
    ctx.font         = `bold ${Math.max(9, ball.radius * 0.5)}px Arial`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(nextAbility, ball.x, ball.y + 2);
    // Cooldown arc — shows time until next ability
    const cdRatio = Math.min(1, ball.wizardTimer / ball.wizardCooldown);
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius + 3, -Math.PI/2, -Math.PI/2 + cdRatio * Math.PI * 2);
    ctx.strokeStyle = ball.wizardAbilityIndex === 0 ? '#44aaffcc' : '#ff6600cc';
    ctx.lineWidth   = 3;
    ctx.stroke();
    // HP bar
    const hpR = Math.max(0, ball.hp / ball.maxHp);
    const bw  = ball.radius * 2.4;
    ctx.fillStyle = '#333333';
    ctx.fillRect(ball.x - bw/2, ball.y + ball.radius + 4, bw, 4);
    ctx.fillStyle = hpR > 0.5 ? '#44ff44' : hpR > 0.25 ? '#ffaa00' : '#ff3333';
    ctx.fillRect(ball.x - bw/2, ball.y + ball.radius + 4, bw * hpR, 4);
    // WIZARD label in kingdom color
    ctx.fillStyle    = ball.color;
    ctx.font         = `bold ${Math.max(8, ball.radius * 0.45)}px Arial`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('WIZARD', ball.x, ball.y + ball.radius + 15);
    // Level badge
    const lx = ball.x - ball.radius * 0.55, ly = ball.y - ball.radius * 0.85;
    const lr = Math.max(7, ball.radius * 0.38);
    ctx.beginPath(); ctx.arc(lx, ly, lr, 0, Math.PI*2);
    ctx.fillStyle = '#8822ee'; ctx.fill();
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.2; ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${Math.floor(lr)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ball.ballLevel, lx, ly);
  });

  // ---- STUN VISUAL on any stunned ball ----
  balls.filter(b => b.isStunned && b.stunTimer > 0).forEach(ball => {
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius + 6, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffff00cc';
    ctx.lineWidth   = 3;
    ctx.stroke();
    ctx.fillStyle    = '#ffff00';
    ctx.font         = `bold ${Math.max(9, ball.radius * 0.5)}px Arial`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`STUN ${(ball.stunTimer/1000).toFixed(1)}s`, ball.x, ball.y - ball.radius - 10);
  });

  // ---- STUN IMMUNITY VISUAL — blue ring ----
  balls.filter(b => !b.isStunned && b.stunImmunity > 0).forEach(ball => {
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius + 5, 0, Math.PI * 2);
    ctx.strokeStyle = '#4499ffcc';
    ctx.lineWidth   = 2;
    ctx.stroke();
  });

  // ---- SUPER STAT VISUAL — white blazing aura ----
  balls.filter(b => b.isSuperStat).forEach(ball => {
    // Outer white blaze
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius + 18, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffffffcc';
    ctx.lineWidth   = 5;
    ctx.stroke();
    // Inner gold ring
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius + 10, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffdd44ff';
    ctx.lineWidth   = 4;
    ctx.stroke();
    // SUPER label
    ctx.fillStyle    = '#ffffff';
    ctx.font         = `bold ${Math.max(10, ball.radius * 0.55)}px Arial`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('SUPER', ball.x, ball.y - ball.radius - 18);
  });

  // Normal balls (skip special units — already drawn above in their own sections)
  // IMPORTANT: must also exclude hooker, horse, king — they have dedicated draw sections
  // Without this exclusion, a kingdom-colored circle is painted ON TOP of their PNGs
  balls.filter(b => !b.isKnight && !b.isShield && !b.isCannon && !b.isRammer && !b.isHooker && !b.isHorse && !b.isWizard && !b.isKing).forEach(ball => {
    // Rage buff ring — red outer glow on balls spawned during rage
    if (ball.isRageBall) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 5, 0, Math.PI * 2);
      ctx.strokeStyle = '#ff4400cc';
      ctx.lineWidth   = 2.5;
      ctx.stroke();
    }
    // Siege glow — orange ring when attacking a kingdom
    if (ball.siegeTarget !== null) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 7, 0, Math.PI * 2);
      ctx.strokeStyle = '#ff880088';
      ctx.lineWidth   = 3;
      ctx.stroke();
    }
    // Block flash — white ring when a hit is blocked
    if (ball.lastBlocked) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 9, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffffffcc';
      ctx.lineWidth   = 3;
      ctx.stroke();
      ctx.fillStyle    = '#ffffff';
      ctx.font         = `bold ${Math.max(9, ball.radius * 0.55)}px Arial`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('BLOCK!', ball.x, ball.y - ball.radius - 10);
    }
    if (ball.fightTimer > 0) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 6, 0, Math.PI * 2);
      ctx.fillStyle = ball.color + '33'; ctx.fill();
    }
    if (ball.ballLevel >= 3) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 3, 0, Math.PI * 2);
      ctx.strokeStyle = getLevelColor(ball.ballLevel) + 'cc';
      ctx.lineWidth = 2.5; ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = getBallColor(ball); ctx.fill();
    ctx.strokeStyle = '#00000066'; ctx.lineWidth = 1.5; ctx.stroke();

    // Troop badge (top-right black)
    const bx = ball.x + ball.radius * 0.6;
    const by = ball.y - ball.radius * 0.6;
    const br = Math.max(8, ball.radius * 0.45);
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2);
    ctx.fillStyle = '#111111'; ctx.fill();
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.2; ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${Math.floor(br * 1.1)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ball.troops, bx, by);

    // Level badge (top-left colored)
    const lx = ball.x - ball.radius * 0.6;
    const ly = ball.y - ball.radius * 0.6;
    const lr = Math.max(7, ball.radius * 0.4);
    ctx.beginPath(); ctx.arc(lx, ly, lr, 0, Math.PI*2);
    ctx.fillStyle = getLevelColor(ball.ballLevel); ctx.fill();
    ctx.strokeStyle = '#000000'; ctx.lineWidth = 1.2; ctx.stroke();
    ctx.fillStyle = '#000000';
    ctx.font = `bold ${Math.floor(lr)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ball.ballLevel, lx, ly);

    // XP arc
    const xpRatio = ball.hits / ball.hitsToLevel;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius + 1,
      Math.PI * 0.5, Math.PI * 0.5 + xpRatio * Math.PI * 2);
    ctx.strokeStyle = getLevelColor(ball.ballLevel) + '99';
    ctx.lineWidth = 2; ctx.stroke();
  });

  // Knights on top (including mercenaries)
  balls.filter(b => b.isKnight).forEach(ball => {
    // ---- VETERAN KNIGHT VISUALS — silver ring ----
    if (ball.isVeteranKnight) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 10, 0, Math.PI * 2);
      ctx.strokeStyle = '#cccccccc';
      ctx.lineWidth   = 3;
      ctx.stroke();
      ctx.fillStyle    = '#cccccc';
      ctx.font         = `bold ${Math.max(9, ball.radius * 0.5)}px Arial`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('VET!', ball.x, ball.y - ball.radius - 14);
    }
    // ---- MEGA KNIGHT VISUALS ----
    if (ball.isMegaKnight) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 14, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffdd44ff';
      ctx.lineWidth   = 4;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 8, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffffff99';
      ctx.lineWidth   = 3;
      ctx.stroke();
      ctx.fillStyle    = '#ffdd44';
      ctx.font         = `bold ${Math.max(9, ball.radius * 0.5)}px Arial`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('MEGA!', ball.x, ball.y - ball.radius - 16);
    }
    // ---- MERCENARY SPECIAL VISUALS ----
    if (ball.isMerc) {
      // Pulsing gray danger ring
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 12, 0, Math.PI * 2);
      ctx.strokeStyle = '#888888cc';
      ctx.lineWidth   = 4;
      ctx.stroke();
      // Red inner ring showing it's hostile to all
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 6, 0, Math.PI * 2);
      ctx.strokeStyle = '#ff000099';
      ctx.lineWidth   = 2.5;
      ctx.stroke();
      drawKnight(ball);
      // MERC label
      ctx.fillStyle    = '#ff4444';
      ctx.font         = `bold ${Math.max(9, ball.radius * 0.5)}px Arial`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('MERC', ball.x, ball.y - ball.radius - 12);
      // Level badge
      const lx = ball.x - ball.radius * 0.55;
      const ly = ball.y - ball.radius * 0.85;
      const lr = Math.max(9, ball.radius * 0.42);
      ctx.beginPath(); ctx.arc(lx, ly, lr, 0, Math.PI*2);
      ctx.fillStyle = '#ff4400'; ctx.fill();
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${Math.floor(lr)}px Arial`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(ball.ballLevel, lx, ly);
      // HP bar
      const bw = ball.radius * 2.6;
      const hpR = Math.max(0, ball.hp / ball.maxHp);
      ctx.fillStyle = '#333333';
      ctx.fillRect(ball.x - bw/2, ball.y + ball.radius + 4, bw, 5);
      ctx.fillStyle = hpR > 0.5 ? '#888888' : hpR > 0.25 ? '#ffaa00' : '#ff3333';
      ctx.fillRect(ball.x - bw/2, ball.y + ball.radius + 4, bw * hpR, 5);
      return; // skip normal knight drawing for mercs
    }
    // Siege glow for knight
    if (ball.siegeTarget !== null) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 10, 0, Math.PI * 2);
      ctx.strokeStyle = '#ff880099';
      ctx.lineWidth   = 3;
      ctx.stroke();
    }
    // Block flash for knight — golden shield flash
    if (ball.lastBlocked) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 12, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffdd44cc';
      ctx.lineWidth   = 4;
      ctx.stroke();
      ctx.fillStyle    = '#ffdd44';
      ctx.font         = `bold ${Math.max(10, ball.radius * 0.6)}px Arial`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('BLOCK!', ball.x, ball.y - ball.radius - 12);
    }
    if (ball.fightTimer > 0) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 8, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff22'; ctx.fill();
    }
    if (ball.ballLevel >= 2) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 5, 0, Math.PI * 2);
      ctx.strokeStyle = getLevelColor(ball.ballLevel) + 'bb';
      ctx.lineWidth = 3; ctx.stroke();
    }

    drawKnight(ball);

    // Level badge
    const lx = ball.x - ball.radius * 0.55;
    const ly = ball.y - ball.radius * 0.85;
    const lr = Math.max(8, ball.radius * 0.38);
    ctx.beginPath(); ctx.arc(lx, ly, lr, 0, Math.PI*2);
    ctx.fillStyle = getLevelColor(ball.ballLevel); ctx.fill();
    ctx.strokeStyle = '#000000'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = '#000000';
    ctx.font = `bold ${Math.floor(lr)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ball.ballLevel, lx, ly);

    // K badge — shows troop count for compacted knights, K for regular
    const sx = ball.x + ball.radius * 0.55;
    const sy = ball.y - ball.radius * 0.85;
    const sr = Math.max(8, ball.radius * 0.38);
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2);
    ctx.fillStyle = ball.isCompactedKnight ? '#111111' : '#222222'; ctx.fill();
    ctx.strokeStyle = ball.isCompactedKnight ? '#ffffff' : '#ffdd44';
    ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = ball.isCompactedKnight ? '#ffffff' : '#ffdd44';
    ctx.font = `bold ${Math.floor(sr * 0.9)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ball.isCompactedKnight ? ball.troops : 'K', sx, sy);

    // XP arc
    const xpRatio = ball.hits / ball.hitsToLevel;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius + 2,
      Math.PI * 0.5, Math.PI * 0.5 + xpRatio * Math.PI * 2);
    ctx.strokeStyle = '#ffdd4499'; ctx.lineWidth = 2.5; ctx.stroke();

    // HP bar
    const bw = ball.radius * 2.2;
    const hpR = Math.max(0, ball.hp / ball.maxHp);
    ctx.fillStyle = '#333333';
    ctx.fillRect(ball.x - bw/2, ball.y + ball.radius + 4, bw, 4);
    ctx.fillStyle = hpR > 0.5 ? '#44ff44' : hpR > 0.25 ? '#ffaa00' : '#ff3333';
    ctx.fillRect(ball.x - bw/2, ball.y + ball.radius + 4, bw * hpR, 4);
  });

  // ---- KINGS ON VERY TOP ----
  balls.filter(b => b.isKing).forEach(ball => {
    // Crown glow — golden aura
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius + 10, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffdd44aa';
    ctx.lineWidth   = 4;
    ctx.stroke();

    // Siege glow
    if (ball.siegeTarget !== null) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 14, 0, Math.PI * 2);
      ctx.strokeStyle = '#ff880099';
      ctx.lineWidth   = 3;
      ctx.stroke();
    }

    // Block flash
    if (ball.lastBlocked) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 16, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffdd44cc';
      ctx.lineWidth   = 4;
      ctx.stroke();
      ctx.fillStyle    = '#ffdd44';
      ctx.font         = `bold ${Math.max(10, ball.radius * 0.6)}px Arial`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('BLOCK!', ball.x, ball.y - ball.radius - 14);
    }

    drawKing(ball);

    // Level badge top-left
    const lx = ball.x - ball.radius * 0.55;
    const ly = ball.y - ball.radius * 0.85;
    const lr = Math.max(9, ball.radius * 0.42);
    ctx.beginPath(); ctx.arc(lx, ly, lr, 0, Math.PI*2);
    ctx.fillStyle = getLevelColor(ball.ballLevel); ctx.fill();
    ctx.strokeStyle = '#000000'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = '#000000';
    ctx.font = `bold ${Math.floor(lr)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ball.ballLevel, lx, ly);

    // Crown badge top-right
    const sx = ball.x + ball.radius * 0.55;
    const sy = ball.y - ball.radius * 0.85;
    const sr = Math.max(9, ball.radius * 0.42);
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2);
    ctx.fillStyle = '#ffdd44'; ctx.fill();
    ctx.strokeStyle = '#000000'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = '#000000';
    ctx.font = `bold ${Math.floor(sr * 0.85)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('K', sx, sy);

    // XP arc
    const xpRatio = ball.hits / ball.hitsToLevel;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius + 2,
      Math.PI * 0.5, Math.PI * 0.5 + xpRatio * Math.PI * 2);
    ctx.strokeStyle = '#ffdd4499'; ctx.lineWidth = 3; ctx.stroke();

    // HP bar
    const bw  = ball.radius * 2.6;
    const hpR = Math.max(0, ball.hp / ball.maxHp);
    ctx.fillStyle = '#333333';
    ctx.fillRect(ball.x - bw/2, ball.y + ball.radius + 4, bw, 5);
    ctx.fillStyle = hpR > 0.5 ? '#44ff44' : hpR > 0.25 ? '#ffaa00' : '#ff3333';
    ctx.fillRect(ball.x - bw/2, ball.y + ball.radius + 4, bw * hpR, 5);
  });

  drawMinimap();
  drawScoreboard();
}

function drawWavyBorder() {
  ctx.strokeStyle = '#7a5010'; ctx.lineWidth = 3;
  ctx.beginPath();
  for (let x = MX; x <= MX + MW; x += 8) {
    const yw = MY + 18 + Math.sin(x * 0.05) * 4;
    x === MX ? ctx.moveTo(x, yw) : ctx.lineTo(x, yw);
  }
  ctx.stroke();
  ctx.beginPath();
  for (let x = MX; x <= MX + MW; x += 8) {
    const yw = MY + MH - 18 + Math.sin(x * 0.05) * 4;
    x === MX ? ctx.moveTo(x, yw) : ctx.lineTo(x, yw);
  }
  ctx.stroke();
  ctx.beginPath();
  for (let y = MY; y <= MY + MH; y += 8) {
    const xw = MX + 18 + Math.sin(y * 0.05) * 4;
    y === MY ? ctx.moveTo(xw, y) : ctx.lineTo(xw, y);
  }
  ctx.stroke();
  ctx.beginPath();
  for (let y = MY; y <= MY + MH; y += 8) {
    const xw = MX + MW - 18 + Math.sin(y * 0.05) * 4;
    y === MY ? ctx.moveTo(xw, y) : ctx.lineTo(xw, y);
  }
  ctx.stroke();
}

function drawTree(x, y) {
  ctx.strokeStyle = '#5a3a10'; ctx.lineWidth = 1.2;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(x,              y - 14 + i * 5);
    ctx.lineTo(x - 7 + i*1.5, y + i * 5);
    ctx.lineTo(x + 7 - i*1.5, y + i * 5);
    ctx.closePath(); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(x, y + 11); ctx.lineTo(x, y + 15); ctx.stroke();
}

function drawMountain(x, y) {
  ctx.strokeStyle = '#5a3a10'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x-18,y+10); ctx.lineTo(x,y-14);   ctx.lineTo(x+18,y+10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+8, y+10); ctx.lineTo(x+22,y-4); ctx.lineTo(x+34,y+10); ctx.stroke();
}

function drawKingdom(k) {
  const x = k.x, y = k.y, bw = 44, bh = 44;
  ctx.globalAlpha = k.alive ? 1 : 0.2;

  // Flash red if under attack
  const underAttack = balls.some(b => b.siegeTarget === k.id);
  if (underAttack) {
    ctx.beginPath();
    ctx.arc(x, y, 36, 0, Math.PI * 2);
    ctx.strokeStyle = '#ff0000cc';
    ctx.lineWidth   = 3;
    ctx.stroke();
  }

  // ---- RAGE BUFF GLOW ----
  if (k.rageBuff) {
    ctx.beginPath();
    ctx.arc(x, y, 40, 0, Math.PI * 2);
    ctx.strokeStyle = '#ff4400cc';
    ctx.lineWidth   = 4;
    ctx.stroke();
    // Rage timer bar above kingdom
    const rageRatio = k.rageTimer / 11000;
    ctx.fillStyle   = '#333333';
    ctx.fillRect(x - 25, y - bh/2 - 18, 50, 5);
    ctx.fillStyle   = '#ff4400';
    ctx.fillRect(x - 25, y - bh/2 - 18, 50 * rageRatio, 5);
    ctx.fillStyle   = '#ff4400';
    ctx.font        = 'bold 8px Arial';
    ctx.textAlign   = 'center';
    ctx.fillText('RAGE!', x, y - bh/2 - 20);
  }

  // ---- SURGE GLOW ----
  if (surgeActive && k.id === surgeKingdomId) {
    ctx.beginPath();
    ctx.arc(x, y, 48, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth   = 4;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x, y, 52, 0, Math.PI * 2);
    ctx.strokeStyle = k.color + 'aa';
    ctx.lineWidth   = 3;
    ctx.stroke();
  }

  ctx.fillStyle = k.color;
  ctx.fillRect(x - bw/2, y - bh/2, bw, bh);
  ctx.strokeStyle = '#111111'; ctx.lineWidth = 2;
  ctx.strokeRect(x - bw/2, y - bh/2, bw, bh);

  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5;
  ctx.strokeRect(x - 10, y - 4, 20, 16);
  ctx.fillStyle = '#ffffff44';
  ctx.fillRect(x - 14, y - 12, 9, 14);
  ctx.fillRect(x + 5,  y - 12, 9, 14);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(x - 14, y - 17, 4, 6);
  ctx.fillRect(x - 10, y - 17, 4, 6);
  ctx.fillRect(x + 5,  y - 17, 4, 6);
  ctx.fillRect(x + 9,  y - 17, 4, 6);

  // Kingdom level badge
  ctx.fillStyle = '#111111';
  ctx.beginPath(); ctx.arc(x - bw/2 + 1, y - bh/2 + 1, 11, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffffff'; ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(k.level, x - bw/2 + 1, y - bh/2 + 1);

  // ---- H TOKEN badge — next to level badge ----
  if (k.hookerToken) {
    ctx.fillStyle = '#ff8800';
    ctx.beginPath(); ctx.arc(x - bw/2 + 16, y - bh/2 + 1, 9, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.2; ctx.stroke();
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 9px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('H', x - bw/2 + 16, y - bh/2 + 1);
  }

  // HP number
  ctx.fillStyle = '#111111'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
  ctx.fillText(Math.max(0, Math.floor(k.hp)), x, y + bh/2 + 13);

  // HP bar
  const ratio = Math.max(0, k.hp / k.maxHp);
  ctx.fillStyle = '#333333'; ctx.fillRect(x - 25, y + bh/2 + 16, 50, 5);
  ctx.fillStyle = ratio > 0.5 ? '#44ff44' : ratio > 0.25 ? '#ffaa00' : '#ff3333';
  ctx.fillRect(x - 25, y + bh/2 + 16, 50 * ratio, 5);

  // Spawn info
  ctx.fillStyle = '#111111'; ctx.font = '9px Arial'; ctx.textAlign = 'center';
  ctx.fillText(`Spawns ${k.level} troop${k.level > 1 ? 's' : ''}`, x, y + bh/2 + 28);

  ctx.globalAlpha = 1;
}

function drawMinimap() {
  const mw = 130, mh = 100;
  const mx = W - mw - 8, my = H - mh - 8;
  ctx.fillStyle = '#c99848'; ctx.fillRect(mx, my, mw, mh);
  ctx.strokeStyle = '#7a5010'; ctx.lineWidth = 2; ctx.strokeRect(mx, my, mw, mh);

  kingdoms.forEach(k => {
    if (!k.alive) return;
    const sx = mx + ((k.x - MX) / MW) * mw;
    const sy = my + ((k.y - MY) / MH) * mh;
    ctx.fillStyle = k.color; ctx.fillRect(sx-5, sy-5, 10, 10);
    ctx.strokeStyle = '#000000'; ctx.lineWidth = 1; ctx.strokeRect(sx-5, sy-5, 10, 10);
  });

  balls.forEach(b => {
    const sx = mx + ((b.x - MX) / MW) * mw;
    const sy = my + ((b.y - MY) / MH) * mh;
    if (b.isMerc) {
      // Gray X on minimap for mercenary
      ctx.fillStyle = '#888888';
      ctx.font = 'bold 9px Arial';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('X', sx, sy);
    } else if (b.isKnight) {
      ctx.fillStyle = '#ffdd44';
      ctx.fillRect(sx-2, sy-2, 4, 4);
    } else {
      ctx.fillStyle = b.color;
      ctx.beginPath(); ctx.arc(sx, sy, 2, 0, Math.PI*2); ctx.fill();
    }
  });

  ctx.fillStyle = '#111111'; ctx.font = 'bold 9px Arial';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('Minimap', mx + 4, my + 3);
}

function drawScoreboard() {
  const alive = kingdoms.filter(k => k.alive);
  const kc    = balls.filter(b => b.isKnight).length;
  ctx.fillStyle = '#000000aa';
  ctx.fillRect(8, 8, 180, alive.length * 18 + 28);
  alive.forEach((k, i) => {
    ctx.fillStyle = k.color;
    ctx.fillRect(12, 14 + i*18, 10, 10);
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(`${k.name} Lv${k.level} HP:${Math.floor(k.hp)}`, 26, 19 + i*18);
  });
  ctx.fillStyle = '#ffdd44'; ctx.font = 'bold 10px Arial';
  ctx.fillText(`Knights: ${kc}`, 12, alive.length * 18 + 20);

  // ---- SPAWN BUTTON top-right of scoreboard ----
  ctx.fillStyle = '#44bb44';
  ctx.fillRect(190, 8, 60, 24);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 11px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('SPAWN', 220, 20);

  // ---- HALF BATTLE BANNER — top center, below scoreboard ----
  if (halfBattle && !finalBattle) {
    const bw = 220, bh = 28;
    const bx = W/2 - bw/2, by = 46;
    ctx.fillStyle = '#ff8800dd';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth   = 2;
    ctx.strokeRect(bx, by, bw, bh);
    ctx.fillStyle    = '#ffffff';
    ctx.font         = `bold ${Math.floor(W * 0.026)}px Arial`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⚡ 4 KINGDOMS — 2x SPEED! ⚡', W/2, by + bh/2);
  }

  // ---- FINAL BATTLE BANNER — top center ----
  if (finalBattle) {
    const bw = 220, bh = 28;
    const bx = W/2 - bw/2, by = 8;
    ctx.fillStyle = '#cc0000dd';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = '#ffdd44';
    ctx.lineWidth   = 2;
    ctx.strokeRect(bx, by, bw, bh);
    ctx.fillStyle    = '#ffdd44';
    ctx.font         = `bold ${Math.floor(W * 0.026)}px Arial`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⚡ FINAL BATTLE — 4x SPEED! ⚡', W/2, by + bh/2);
  }

  // ---- SURGE BANNER — below final battle banner ----
  if (surgeActive && finalBattle) {
    const surgeK = kingdoms.find(k => k.id === surgeKingdomId);
    if (surgeK) {
      const bw = 260, bh = 26;
      const bx = W/2 - bw/2, by = 42;
      ctx.fillStyle = surgeK.color + 'cc';
      ctx.fillRect(bx, by, bw, bh);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth   = 2;
      ctx.strokeRect(bx, by, bw, bh);
      ctx.fillStyle    = '#ffffff';
      ctx.font         = `bold ${Math.floor(W * 0.025)}px Arial`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(`SURGE: ${surgeK.name} 4x DMG+UPGRADE!`, W/2, by + bh/2);
      // Countdown bar
      const ratio = surgeTimer / 30000;
      ctx.fillStyle = '#000000aa';
      ctx.fillRect(bx, by + bh, bw, 5);
      ctx.fillStyle = surgeK.color;
      ctx.fillRect(bx, by + bh, bw * ratio, 5);
    }
  }
  // ---- HOOKER TRASH TALK ----
  if (trashTalkActive) {
    const bw = 300, bh = 36;
    const bx = W/2 - bw/2, by = H - 168;
    ctx.fillStyle = '#cc0000ee';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = '#ff4444';
    ctx.lineWidth   = 2;
    ctx.strokeRect(bx, by, bw, bh);
    ctx.fillStyle    = '#ffffff';
    ctx.font         = `bold ${Math.floor(W * 0.026)}px Arial`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`"No King, Pathetic" — Hooker`, W/2, by + bh/2);
    // Countdown bar — drains to zero then hooker kills
    const ratio = 1 - (trashTalkTimer / 5000);
    ctx.fillStyle = '#000000aa';
    ctx.fillRect(bx, by + bh, bw, 5);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(bx, by + bh, bw * ratio, 5);
  }
}

function drawGameOver() {

  ctx.fillStyle = '#ffdd44';
  ctx.font = `bold ${Math.floor(W * 0.08)}px Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

});

// ---- SPAWN PANEL LOGIC ----
function openSpawnPanel() {
  const sel = document.getElementById('spawnKingdom');
  sel.innerHTML = kingdoms.filter(k => k.alive).map(k =>
    `<option value="${k.id}">${k.name} Lv${k.level}</option>`
  ).join('');
  document.getElementById('spawnPanel').style.display = 'block';
}

function closeSpawnPanel() {
  document.getElementById('spawnPanel').style.display = 'none';
}

function doSpawn() {
  const kid    = parseInt(document.getElementById('spawnKingdom').value);
  const type   = document.getElementById('spawnType').value;
  const level  = parseInt(document.getElementById('spawnLevel').value) || 1;
  const amount = parseInt(document.getElementById('spawnAmount').value) || 1;
  const k      = kingdoms.find(k => k.id === kid);
  if (!k) return;

  const angle  = Math.random() * Math.PI * 2;
  const spd    = finalBattle ? 4.0 : halfBattle ? 2.0 : 1.0;

  if (type === 'ball') {
    const hp = amount * HP_PER_TROOP + HP_BONUS * (level - 1);
    const dmg = DMG_PER_TROOP + DMG_BONUS * (level - 1);
    balls.push({
      x: k.x + Math.cos(angle)*20, y: k.y + Math.sin(angle)*20,
      hp, maxHp: hp, troops: amount, maxTroops: amount,
      troopDmg: dmg, isKnight: false, isKing: false, isShield: false,
      isCannon: false, isRammer: false,
      ballLevel: level, hits: 0, hitsToLevel: level * HITS_PER_LEVEL,
      speed: Math.min(1.2 * spd, 12), radius: baseRadius(amount),
      team: k.id, color: k.color, cr: k.r, cg: k.g, cb: k.b,
      fightTimer: 0, wobble: Math.random()*Math.PI*2,
      trailX: k.x, trailY: k.y, swordAngle: 0, swordSwinging: false,
      siegeTimer: 0, siegeTarget: null, isRageBall: false, lastBlocked: false
    });
  } else if (type === 'knight') {
    const dmg = DMG_PER_TROOP * KNIGHT_DMG_MULT + DMG_BONUS * 2 * (level - 1);
    const hp  = (KNIGHT_HP + HP_BONUS * (level - 1)) * amount;
    balls.push({
      x: k.x + Math.cos(angle)*20, y: k.y + Math.sin(angle)*20,
      hp, maxHp: hp, troops: amount, maxTroops: amount,
      troopDmg: dmg, isKnight: true, isEliteKnight: true,
      isCompactedKnight: amount > 1, isKing: false, isShield: false,
      isCannon: false, isRammer: false,
      ballLevel: level, hits: 0, hitsToLevel: level * HITS_PER_LEVEL,
      speed: Math.min(KNIGHT_SPEED * spd, 12),
      radius: Math.min(KNIGHT_RADIUS + amount * 1.5, 52),
      team: k.id, color: k.color, cr: k.r, cg: k.g, cb: k.b,
      fightTimer: 0, wobble: Math.random()*Math.PI*2,
      trailX: k.x, trailY: k.y, swordAngle: 0, swordSwinging: false,
      siegeTimer: 0, siegeTarget: null, isRageBall: false, lastBlocked: false
    });
  } else if (type === 'king') {
    spawnKing(k);
  } else if (type === 'shield') {
    spawnShield(k);
  } else if (type === 'cannon') {
    spawnCannon(k, spd);
  } else if (type === 'rammer') {
    spawnRammer(k, spd);
  } else if (type === 'hooker') {
    const alreadyHasHooker = balls.some(b => b.isHooker && b.team === k.id);
    if (!alreadyHasHooker) spawnHooker(k, spd);
  } else if (type === 'horse') {
    spawnHorseKnight(k, spd);
  } else if (type === 'wizard') {
    spawnWizard(k, spd);
  }
  closeSpawnPanel();
}

// Detect tap on SPAWN button (top-right of scoreboard)
canvas.addEventListener('touchstart', e => {
  // Start music on first tap — bypasses autoplay restriction
  if (!musicStarted) {
    musicStarted = true;
    musicMain.play().catch(()=>{});
    musicState = 'main';
  }
  const t = e.touches[0];
  if (t.clientX >= 190 && t.clientX <= 250 && t.clientY >= 8 && t.clientY <= 32) {
    openSpawnPanel();
  }
}, { passive: true });

// ---- MUSIC SYSTEM ----
const musicMain   = document.getElementById('music_main');
const musicHooker = document.getElementById('music_hooker');
const musicDrop   = document.getElementById('music_drop');
const VOLATILE_START = 77;
const VOLATILE_END   = 85;
let musicState   = 'none';
let musicStarted = false;

function updateMusic() {
  try {
    if (!musicStarted) return; // wait for first tap
    const hasHookerOnField = balls.some(b => b.isHooker);

    if (trashTalkActive) {
      if (musicState !== 'silence') {
        musicMain.pause();
        musicHooker.pause();
        musicDrop.pause();
        musicState = 'silence';
      }
    } else if (musicState === 'silence' && !trashTalkActive) {
      musicDrop.currentTime = 0;
      musicDrop.play().catch(()=>{});
      musicState = 'drop';
    } else if (hasHookerOnField && musicState !== 'hooker' && musicState !== 'drop' && musicState !== 'silence') {
      musicMain.pause();
      musicHooker.currentTime = VOLATILE_START;
      musicHooker.play().catch(()=>{});
      musicState = 'hooker';
    } else if (!hasHookerOnField && musicState === 'hooker') {
      musicHooker.pause();
      musicMain.play().catch(()=>{});
      musicState = 'main';
    } else if (musicState === 'none') {
      musicMain.play().catch(()=>{});
      musicState = 'main';
    }

    if (musicState === 'hooker' && musicHooker.currentTime >= VOLATILE_END) {
      musicHooker.currentTime = VOLATILE_START;
    }
  } catch(e) {} // silent fail if audio unavailable
}

requestAnimationFrame(update);
</script>
