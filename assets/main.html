<!DOCTYPE html>
<html>
<head>
  <title>Ball Kingdom Wars</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<div id="errorBox" style="display:none;position:fixed;top:0;left:0;width:100%;background:#ff0000;color:#fff;font-size:14px;padding:10px;z-index:9999;word-break:break-all;"></div>

<script>
window.onerror = function(msg, src, line, col, err) {
  const box = document.getElementById('errorBox');
  if (box) { box.style.display='block'; box.textContent = 'ERROR L'+line+': '+msg; }
  return true;
};
</script>

<!-- AUDIO — fails silently if files missing -->
<audio id="music_main" loop src="cipher.mp3" onerror="this.src=''"></audio>
<audio id="music_hooker" src="volatile.mp3" onerror="this.src=''"></audio>
<audio id="music_drop" src="slaughterhouse.mp3" onerror="this.src=''"></audio>

<!-- SPAWN PANEL -->
<div id="spawnPanel" style="
  display:none; position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#1a1a2e; border:2px solid #44bb44;
  border-radius:14px; padding:20px; z-index:999;
  width:280px; color:#fff; font-family:Arial,sans-serif;">
  <h3 style="color:#44bb44;text-align:center;margin-bottom:14px">⚔️ Spawn Troops</h3>
  <label style="font-size:13px;color:#aaa">Kingdom</label>
  <select id="spawnKingdom" style="width:100%;padding:8px;border-radius:8px;background:#0d0d1a;color:#fff;border:1px solid #44bb44;margin-bottom:10px;font-size:14px"></select>
  <label style="font-size:13px;color:#aaa">Troop Type</label>
  <select id="spawnType" style="width:100%;padding:8px;border-radius:8px;background:#0d0d1a;color:#fff;border:1px solid #44bb44;margin-bottom:10px;font-size:14px">
    <option value="ball">⚽ Normal Ball</option>
    <option value="knight">⚔️ Knight</option>
    <option value="king">👑 King</option>
    <option value="shield">🛡️ Shield</option>
    <option value="cannon">🎯 Cannon</option>
    <option value="rammer">🔨 Rammer</option>
    <option value="hooker">🪝 Hooker</option>
    <option value="horse">🐴 Horse Knight</option>
    <option value="wizard">🧙 Wizard</option>
  </select>
  <label style="font-size:13px;color:#aaa">Level</label>
  <input id="spawnLevel" type="number" value="1" min="1" max="100" style="width:100%;padding:8px;border-radius:8px;background:#0d0d1a;color:#fff;border:1px solid #44bb44;margin-bottom:10px;font-size:14px">
  <label style="font-size:13px;color:#aaa">Amount (troops inside)</label>
  <input id="spawnAmount" type="number" value="1" min="1" max="999" style="width:100%;padding:8px;border-radius:8px;background:#0d0d1a;color:#fff;border:1px solid #44bb44;margin-bottom:14px;font-size:14px">
  <div style="display:flex;gap:10px">
    <button onclick="doSpawn()" style="flex:1;padding:10px;background:#44bb44;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:bold">✅ Spawn</button>
    <button onclick="closeSpawnPanel()" style="flex:1;padding:10px;background:#555;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:bold">❌ Close</button>
  </div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
const W  = canvas.width;
const H  = canvas.height;
const MX = W * 0.04;
const MY = H * 0.04;
const MW = W * 0.92;
const MH = H * 0.92;

// ---- CONSTANTS ----
const HP_PER_TROOP   = 40;
const DMG_PER_TROOP  = 5;
const HITS_PER_LEVEL = 3;
const DMG_BONUS      = 2;
const HP_BONUS       = 10;
const SPEED_BONUS    = 0.08;

// ---- KNIGHT CONSTANTS ----
const KNIGHT_CHANCE  = 0.05;
const KNIGHT_HP      = 120;
const KNIGHT_RADIUS  = 18;
const KNIGHT_SPEED   = 1.4;
const KNIGHT_DMG_MULT = 2.0;

const knightImg = new Image();
knightImg.src = 'knight.png';

// King spawns when a kingdom falls — image file
const kingImg = new Image();
kingImg.src = 'king.png';

// Body shield — stays near kingdom, blocks sieging balls
const shieldImg = new Image();
shieldImg.src = 'ballshield.png';

// Cannon — glass cannon, long range, one shots shields, 1 HP
const cannonImg = new Image();
cannonImg.src = 'cannon.png';

// Rammer — rams random troop, stuns them, high damage, speed 2
const rammerImg = new Image();
rammerImg.src = 'rammer.png';

// Hooker — rare unit, traps enemy balls, deflects all damage
const hookerImg = new Image();
hookerImg.src = 'hooker.png';

// Sword — hooker's weapon, pointing north
const swordImg = new Image();
swordImg.src = 'sword.png';

// Horse knight — cavalry unit, hunts cannons, immune to cannon fire
const horseImg = new Image();
horseImg.src = 'horse.png';

// Wizard — ranged unit, alternates freeze (5s) and fireball (2x knight dmg, ranged), 1 in 50 spawn
const wizardImg = new Image();
wizardImg.src = 'wizard.png';

// ---- KINGDOM CONFIGS ----
const CONFIGS = [
  { name:'Orange', color:'#ff8800', r:255, g:136, b:0,   px:0.35, py:0.04 },
  { name:'Red',    color:'#ee2222', r:238, g:34,  b:34,  px:0.60, py:0.04 },
  { name:'Blue',   color:'#2255ff', r:34,  g:85,  b:255, px:0.04, py:0.30 },
  { name:'Cyan',   color:'#00ccee', r:0,   g:204, b:238, px:0.92, py:0.30 },
  { name:'Pink',   color:'#ff44bb', r:255, g:68,  b:187, px:0.04, py:0.62 },
  { name:'Yellow', color:'#ddcc00', r:221, g:204, b:0,   px:0.92, py:0.62 },
  { name:'Green',  color:'#22bb22', r:34,  g:187, b:34,  px:0.35, py:0.92 },
  { name:'Purple', color:'#8822ee', r:136, g:34,  b:238, px:0.60, py:0.92 }
];

// ---- BUILD KINGDOMS ----
let kingdoms = CONFIGS.map((c, i) => ({
  id: i, name: c.name, color: c.color,
  r: c.r, g: c.g, b: c.b,
  x: MX + c.px * MW,
  y: MY + c.py * MH,
  hp: 3000000, maxHp: 3000000,
  level: 1,
  spawnRate:    3500 + Math.random() * 1500,
  timer:        Math.random() * 2000,
  upgradeTimer: 0,
  alive: true,
  spawnCount: 0,
  lastShieldSpawned: false,
  hookerToken: false, // H icon — auto spawns hooker when below 25% HP
  // ---- KNIGHT DEATH RAGE BUFF ----
  rageBuff:     false,
  rageTimer:    0
}));

// Assign H token to 2 random kingdoms
(function assignHookerTokens() {
  const indices = [...Array(kingdoms.length).keys()];
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  kingdoms[indices[0]].hookerToken = true;
  kingdoms[indices[1]].hookerToken = true;
})();

let balls = [];

// ---- TORNADO — environmental hazard, no team ----
// Spawns randomly every 20s, drifts slowly, pulls and damages all nearby balls
const tornadoImg = new Image();
tornadoImg.src = 'tornado.png';

let tornadoes = [];
let tornadoSpawnTimer = 10000; // first tornado after 10s
const TORNADO_SPAWN_INTERVAL = 20000; // new one every 20s
const TORNADO_LIFETIME       = 12000; // lives 12s then fades
const TORNADO_PULL_RANGE     = 90;    // suck radius in px
const TORNADO_PULL_FORCE     = 1.8;   // pixels pulled per frame
const TORNADO_MAX            = 3;     // max on field at once

function spawnTornado() {
  tornadoes.push({
    x: MX + (0.1 + Math.random() * 0.8) * MW,
    y: MY + (0.1 + Math.random() * 0.8) * MH,
    radius: 28,
    driftAngle: Math.random() * Math.PI * 2,
    driftSpeed: 0.4 + Math.random() * 0.4,
    lifetime: TORNADO_LIFETIME,
    tickTimer: 0,
    wobble: Math.random() * Math.PI * 2,
    spinAngle: 0
  });
}

// ---- TSUNAMI — environmental hazard, no team ----
// Spawns from a random edge, charges across the map at speed 4
// Deals 50% max HP on contact — one hit per ball per tsunami, then gone off-screen
const tsunamiImg = new Image();
tsunamiImg.src = 'tsunami.png';

let tsunamis = [];
let tsunamiSpawnTimer = 15000; // first tsunami after 15s
const TSUNAMI_SPAWN_INTERVAL = 25000;
const TSUNAMI_SPEED          = 4;
const TSUNAMI_RADIUS         = 40;
const TSUNAMI_MAX            = 2;

function spawnTsunami() {
  // Spawn from a random edge and charge across to the opposite side
  const side = Math.floor(Math.random() * 4); // 0=top,1=right,2=bottom,3=left
  let x, y, angle;
  if (side === 0)      { x = MX + Math.random() * MW; y = MY;        angle = Math.PI * 0.5; }
  else if (side === 1) { x = MX + MW;                 y = MY + Math.random() * MH; angle = Math.PI; }
  else if (side === 2) { x = MX + Math.random() * MW; y = MY + MH;   angle = -Math.PI * 0.5; }
  else                 { x = MX;                       y = MY + Math.random() * MH; angle = 0; }
  // Slight random spread so it's not perfectly straight
  angle += (Math.random() - 0.5) * 0.3;
  tsunamis.push({
    x, y, angle,
    radius: TSUNAMI_RADIUS,
    hitBalls: new Set(), // each ball only hit once per tsunami
    spinAngle: 0
  });
}

// ---- TREES ----
const trees = [];
for (let i = 0; i < 80; i++) {
  trees.push({
    x: MX + (0.08 + Math.random() * 0.84) * MW,
    y: MY + (0.08 + Math.random() * 0.84) * MH
  });
}

// ---- MOUNTAINS ----
const mountains = [
  {x:0.08,y:0.10},{x:0.18,y:0.07},{x:0.78,y:0.07},{x:0.88,y:0.10},
  {x:0.08,y:0.84},{x:0.18,y:0.88},{x:0.78,y:0.88},{x:0.88,y:0.84},
  {x:0.03,y:0.48},{x:0.93,y:0.48}
].map(p => ({ x: MX + p.x * MW, y: MY + p.y * MH }));

// ---- HELPERS ----
function getDist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function baseRadius(troops) {
  return Math.min(10 + troops * 2.5, 32);
}

function getBallColor(ball) {
  if (ball.isKnight) return ball.color;
  const ratio = ball.troops / ball.maxTroops;
  const d     = 0.25 + ratio * 0.75;
  return `rgb(${Math.floor(ball.cr*d)},${Math.floor(ball.cg*d)},${Math.floor(ball.cb*d)})`;
}

function getLevelColor(lvl) {
  if (lvl >= 10) return '#ff4400';
  if (lvl >= 7)  return '#ff9900';
  if (lvl >= 4)  return '#ffdd00';
  return '#44dd44';
}

// ---- SPAWN BALL ----
function spawnBall(k, speedMult) {
  if (speedMult === undefined) speedMult = 1.0;
  const knightsOnField = balls.filter(b => b.isKnight && !b.isMerc && b.team === k.id).length;
  // Surge buffs: 1.5x knight chance, 1.7x veteran chance
  const isSurging      = surgeActive && k.id === surgeKingdomId;
  const knightChance   = KNIGHT_CHANCE * (isSurging ? 1.5 : 1.0);
  const veteranChance  = (1/125) * (isSurging ? 1.7 : 1.0);
  const isKnight  = Math.random() < knightChance && knightsOnField < 100;
  const isVeteran = !isKnight && Math.random() < veteranChance && knightsOnField < 100;
  const isHooker  = !isKnight && !isVeteran && Math.random() < (1/150);
  // 1 in 50 chance to spawn a horse knight — cannon hunter
  const isHorse   = !isKnight && !isVeteran && !isHooker && Math.random() < (1/50);
  // 1 in 50 chance to spawn a wizard — freeze/fireball alternator
  const isWizard  = !isKnight && !isVeteran && !isHooker && !isHorse && Math.random() < (1/50);
  const angle     = Math.random() * Math.PI * 2;

  if (isHorse) {
    spawnHorseKnight(k, speedMult);
    return;
  } else if (isWizard) {
    spawnWizard(k, speedMult);
    return;
  } else if (isHooker) {
    // Only spawn if kingdom doesn't already have a hooker
    const alreadyHasHooker = balls.some(b => b.isHooker && b.team === k.id);
    if (!alreadyHasHooker) spawnHooker(k, speedMult);
    return;
  } else if (isVeteran) {
    // Level 50 veteran knight — rare surprise spawn
    const kLevel  = 50;
    const kHp     = KNIGHT_HP + HP_BONUS * (kLevel - 1);
    const kDmg    = DMG_PER_TROOP * KNIGHT_DMG_MULT + DMG_BONUS * 2 * (kLevel - 1);
    const kRadius = Math.min(KNIGHT_RADIUS + kLevel * 1.5, 38);
    const kSpeed  = Math.min(KNIGHT_SPEED * speedMult + SPEED_BONUS * (kLevel - 1), 12.0);
    balls.push({
      x: k.x + Math.cos(angle) * 20,
      y: k.y + Math.sin(angle) * 20,
      hp: kHp, maxHp: kHp,
      troops: 1, maxTroops: 1,
      troopDmg: kDmg,
      isKnight: true, isVeteranKnight: true,
      ballLevel: kLevel, hits: 0, hitsToLevel: kLevel * HITS_PER_LEVEL,
      speed: kSpeed, radius: kRadius,
      team: k.id, color: k.color,
      cr: k.r, cg: k.g, cb: k.b,
      fightTimer: 0, wobble: Math.random() * Math.PI * 2,
      trailX: k.x, trailY: k.y,
      swordAngle: 0, swordSwinging: false,
      siegeTimer: 0, siegeTarget: null,
      isRageBall: false, lastBlocked: false
    });
  } else if (isKnight) {
    // Normal level 1 knight
    balls.push({
      x: k.x + Math.cos(angle) * 20,
      y: k.y + Math.sin(angle) * 20,
      hp: KNIGHT_HP, maxHp: KNIGHT_HP,
      troops: 1, maxTroops: 1,
      troopDmg: DMG_PER_TROOP * KNIGHT_DMG_MULT,
      isKnight: true,
      ballLevel: 1, hits: 0, hitsToLevel: HITS_PER_LEVEL,
      speed: Math.min(KNIGHT_SPEED * speedMult, 12.0), radius: KNIGHT_RADIUS,
      team: k.id, color: k.color,
      cr: k.r, cg: k.g, cb: k.b,
      fightTimer: 0, wobble: Math.random() * Math.PI * 2,
      trailX: k.x, trailY: k.y,
      swordAngle: 0, swordSwinging: false,
      siegeTimer: 0, siegeTarget: null
    });
  } else {
    // Apply 2.6x troop multiplier if kingdom has rage buff from knight death
    // Surge also gives 4x troops on top of rage if active
    const rageMult   = k.rageBuff ? 2.6 : 1.0;
    const surgeTroop = isSurging ? 4.0 : 1.0;
    const troopMult  = rageMult * surgeTroop;
    const troops     = Math.ceil(k.level * troopMult);
    // Starting ball level: +1 for every 50 kingdom levels, capped at level 100
    const startLevel = Math.min(100, 1 + Math.floor(k.level / 50));
    // Apply level bonuses to stats for each starting level above 1
    const levelsGained = startLevel - 1;
    const startDmg     = DMG_PER_TROOP + DMG_BONUS * levelsGained;
    const startHpBonus = HP_BONUS * levelsGained;
    const startHp      = troops * HP_PER_TROOP + startHpBonus;
    balls.push({
      x: k.x + Math.cos(angle) * 18,
      y: k.y + Math.sin(angle) * 18,
      hp: startHp, maxHp: startHp,
      troops, maxTroops: troops,
      troopDmg: startDmg,
      isKnight: false,
      ballLevel: startLevel,
      hits: 0, hitsToLevel: startLevel * HITS_PER_LEVEL,
      speed: Math.min((1.0 + Math.random() * 0.5) * speedMult, 12.0),
      radius: baseRadius(troops),
      team: k.id, color: k.color,
      cr: k.r, cg: k.g, cb: k.b,
      fightTimer: 0,
      wobble: Math.random() * Math.PI * 2,
      trailX: k.x, trailY: k.y,
      swordAngle: 0, swordSwinging: false,
      siegeTimer: 0, siegeTarget: null,
      isRageBall: k.rageBuff
    });
  }
}

// ---- SPAWN KING (last stand when kingdom falls) ----
// King level = kingdom level, stats scale accordingly
// Base HP: 5M, Base Damage: 75k
function spawnKing(k) {
  const kingLevel  = k.level;
  const kingHp     = 5000000 + kingLevel * 80 + (KNIGHT_HP * 40);
  const kingDmg    = 75000 + kingLevel * 8 + 150;
  const kingRadius = Math.min(16 + kingLevel * 2, 36);
  const kingSpeed  = finalBattle ? Math.min(1.8 * 4, 12) : 1.8;
  const angle      = Math.random() * Math.PI * 2;
  balls.push({
    x: k.x + Math.cos(angle) * 22,
    y: k.y + Math.sin(angle) * 22,
    hp: kingHp, maxHp: kingHp,
    troops: 1, maxTroops: 1,
    troopDmg: kingDmg,
    isKnight: false,
    isKing:   true,
    ballLevel: kingLevel,
    hits: 0, hitsToLevel: kingLevel * HITS_PER_LEVEL,
    speed: kingSpeed,
    radius: kingRadius,
    team:   k.id,
    color:  k.color,
    cr: k.r, cg: k.g, cb: k.b,
    fightTimer: 0,
    wobble: Math.random() * Math.PI * 2,
    trailX: k.x, trailY: k.y,
    swordAngle: 0, swordSwinging: false,
    siegeTimer: 0, siegeTarget: null,
    isRageBall: false,
    lastBlocked: false
  });

  // ---- SPAWN 4 ELITE SHIELDS WITH 50M HP PROTECTING THE KING ----
  for (let i = 0; i < 4; i++) {
    const shieldAngle = (Math.PI * 2 / 4) * i;
    balls.push({
      x: k.x + Math.cos(shieldAngle) * 35,
      y: k.y + Math.sin(shieldAngle) * 35,
      hp: 50000000, maxHp: 50000000, // 50 million HP
      troops: 1, maxTroops: 1,
      troopDmg: 0,
      isKnight:  false,
      isKing:    false,
      isShield:  true,
      isEliteKingShield: true, // special flag
      ballLevel: 1, hits: 0, hitsToLevel: HITS_PER_LEVEL,
      speed: 0.5,
      radius: 24,
      homeX: k.x,
      homeY: k.y,
      team:  k.id, color: k.color,
      cr: k.r, cg: k.g, cb: k.b,
      fightTimer: 0,
      wobble: Math.random() * Math.PI * 2,
      trailX: k.x, trailY: k.y,
      swordAngle: 0, swordSwinging: false,
      siegeTimer: 0, siegeTarget: null,
      isRageBall: false,
      lastBlocked: false
    });
  }
}

// ---- SPAWN BODY SHIELD ----
// Stays near kingdom, blocks balls from sieging until it dies
// 8x king HP, zero damage, white part = kingdom color
function spawnShield(k) {
  const kingHp      = k.level * 80 + (KNIGHT_HP * 4);
  const shieldHp    = kingHp * 8;
  const shieldRadius = Math.min(20 + k.level * 2, 42);
  const angle        = Math.random() * Math.PI * 2;
  balls.push({
    x: k.x + Math.cos(angle) * 26,
    y: k.y + Math.sin(angle) * 26,
    hp: shieldHp, maxHp: shieldHp,
    troops: 1, maxTroops: 1,
    troopDmg: 0,           // no damage
    isKnight:  false,
    isKing:    false,
    isShield:  true,       // shield flag
    ballLevel: 1, hits: 0, hitsToLevel: HITS_PER_LEVEL,
    speed: 0.4,            // barely moves, stays near kingdom
    radius: shieldRadius,
    homeX: k.x,            // remembers its kingdom position
    homeY: k.y,
    team:  k.id,
    color: k.color,
    cr: k.r, cg: k.g, cb: k.b,
    fightTimer: 0,
    wobble: Math.random() * Math.PI * 2,
    trailX: k.x, trailY: k.y,
    swordAngle: 0, swordSwinging: false,
    siegeTimer: 0, siegeTarget: null,
    isRageBall: false,
    lastBlocked: false
  });
}

// ---- SPAWN HOOKER ----
// Rare unit (1/150 chance), pulls any enemy ball toward itself
// Trapped ball stays locked until it dies — hooker deals 25% max HP per hit
// 100% deflects all damage — only veteran knights and lvl 220+ kings can kill it
// HP = 4x shield HP, level up = faster pull/attack speed
function spawnHooker(k, speedMult) {
  if (speedMult === undefined) speedMult = 1.0;
  const angle    = Math.random() * Math.PI * 2;
  const kingHp   = k.level * 80 + (KNIGHT_HP * 4);
  const shieldHp = kingHp * 8;
  const hookerHp = shieldHp * 4; // 4x shield HP
  balls.push({
    x: k.x + Math.cos(angle) * 22,
    y: k.y + Math.sin(angle) * 22,
    hp: hookerHp, maxHp: hookerHp,
    troops: 1, maxTroops: 1,
    troopDmg: 0, // damage handled specially (25% target maxHp)
    isKnight: false, isKing: false, isShield: false,
    isCannon: false, isRammer: false,
    isHooker: true,
    ballLevel: 1, hits: 0, hitsToLevel: HITS_PER_LEVEL,
    speed: Math.min(1.0 * speedMult, 12.0),
    radius: 20,
    hookTimer: 0,
    hookCooldown: 3000, // pulls every 3s, decreases with level
    hookedTarget: null, // currently trapped ball
    team: k.id, color: k.color,
    cr: k.r, cg: k.g, cb: k.b,
    fightTimer: 0,
    wobble: Math.random() * Math.PI * 2,
    trailX: k.x, trailY: k.y,
    swordAngle: 0, swordSwinging: false,
    siegeTimer: 0, siegeTarget: null,
    isRageBall: false, lastBlocked: false
  });
}

// ---- SPAWN HORSE KNIGHT ----
// Cavalry unit — cannon hunter, 1/50 chance
// Only targets cannons, runs through normal balls, immune to cannon fire
// Only damaged by knights, kings, hookers, MLVL cannons, mega knights
function spawnHorseKnight(k, speedMult) {
  if (speedMult === undefined) speedMult = 1.0;
  const angle   = Math.random() * Math.PI * 2;
  const horseHp  = KNIGHT_HP * 3;
  balls.push({
    x: k.x + Math.cos(angle) * 22,
    y: k.y + Math.sin(angle) * 22,
    hp: horseHp, maxHp: horseHp,
    troops: 1, maxTroops: 1,
    troopDmg: CANNON_DAMAGE, // instant kill on cannon contact
    isKnight: false, isKing: false, isShield: false,
    isCannon: false, isRammer: false, isHooker: false,
    isHorse: true,
    ballLevel: 1, hits: 0, hitsToLevel: HITS_PER_LEVEL,
    speed: Math.min(3.5 * speedMult, 12.0),
    radius: 22,
    horseTarget: null,
    team: k.id, color: k.color,
    cr: k.r, cg: k.g, cb: k.b,
    fightTimer: 0, wobble: Math.random() * Math.PI * 2,
    trailX: k.x, trailY: k.y,
    swordAngle: 0, swordSwinging: false,
    siegeTimer: 0, siegeTarget: null,
    isRageBall: false, lastBlocked: false
  });

function spawnEliteKnight(k, speedMult) {

    trailX: k.x, trailY: k.y,
    swordAngle: 0, swordSwinging: false,

const RAMMER_DMG_MULT = 3.0; // knight is 2x, rammer is 50% more = 3x

function spawnRammer(k, speedMult) {

function updateTroops(ball) {
  // These special units manage their own state — skip troop recalculation
  if (ball.isKnight || ball.isShield || ball.isHooker || ball.isHorse || ball.isWizard) return;
  // Compacted knights update troop count as knights die (HP drops)
  if (ball.isCompactedKnight) {
    const hpPerKnight = (KNIGHT_HP + HP_BONUS * 9);
    ball.troops = Math.max(0, Math.ceil(ball.hp / hpPerKnight));
    ball.radius = Math.min(KNIGHT_RADIUS + ball.troops * 1.5, 52);
    return;
  }
  ball.troops = Math.max(0, Math.ceil(ball.hp / HP_PER_TROOP));
  ball.radius = baseRadius(ball.troops);
}

// ---- BALL LEVEL UP ----
// Knights and Kings: +75% to damage and HP per level (multiplicative)
// Normal balls: flat DMG_BONUS and HP_BONUS per level
// Speed stays as flat bonus for all units
const KNIGHT_KING_LEVEL_MULT = 0.75; // 75% increase per level

function checkLevelUp(ball) {
  if (ball.hits >= ball.hitsToLevel) {
    // Normal balls cap at level 100 — no more leveling after that
    if (!ball.isKnight && !ball.isKing && !ball.isShield && ball.ballLevel >= 100) {
      ball.hits = 0;
      return;
    }
    // Shields cap at level 750
    if (ball.isShield && ball.ballLevel >= 750) {
      ball.hits = 0;
      return;
    }
    ball.ballLevel++;
    ball.hits = 0;

    // ---- MEGA LEVEL CHECK ----
    // Handled separately in kingdom timer — not here
    const isMegaKnight = false;

    if (ball.isMegaKnight) {
      // Already a mega knight — keep 3 hit leveling and 100% scaling
      ball.hitsToLevel = 3;
      if (ball.ballLevel > 100) { ball.ballLevel = 100; ball.hits = 0; return; }
      ball.troopDmg = Math.floor(ball.troopDmg * 2.0);
      const hpBoost = Math.floor(ball.maxHp * 1.0);
      ball.maxHp   += hpBoost;
      const healAmount = Math.floor(ball.maxHp * 0.50);
      ball.hp       = Math.min(ball.hp + hpBoost + healAmount, ball.maxHp);
    } else if (ball.isWizard) {
      // Wizard: -5% cooldown per level (min 800ms), +25% fireball damage, +10% freeze duration
      ball.hitsToLevel        = ball.ballLevel * HITS_PER_LEVEL;
      ball.wizardCooldown     = Math.max(800, ball.wizardCooldown * 0.95);
      ball.troopDmg           = Math.floor(ball.troopDmg * 1.25);
      ball.wizardFreezeDuration = Math.floor((ball.wizardFreezeDuration || 5000) * 1.10);
      const wizHpBoost        = Math.floor(ball.maxHp * 0.10);
      ball.maxHp             += wizHpBoost;
      ball.hp                 = Math.min(ball.hp + wizHpBoost, ball.maxHp);
    } else if (ball.isHooker) {
      // Hooker: faster pull/attack speed per level (cooldown reduces by 100ms per level, min 500ms)
      ball.hitsToLevel  = ball.ballLevel * HITS_PER_LEVEL;
      ball.hookCooldown = Math.max(500, (ball.hookCooldown || 3000) - 100);
    } else if (ball.isCannon) {
      // Cannon: 2x damage, 0.5% more HP per level
      ball.hitsToLevel = ball.ballLevel * HITS_PER_LEVEL;
      ball.troopDmg    = Math.floor(ball.troopDmg * 2.0);
      const hpBoost    = Math.floor(ball.maxHp * 0.005);
      ball.maxHp      += hpBoost;
      ball.hp          = Math.min(ball.hp + hpBoost, ball.maxHp);
    } else if (ball.isRammer) {
      // Rammer: 2x damage, +2% cannon miss chance per level (caps at 95%)
      ball.hitsToLevel    = ball.ballLevel * HITS_PER_LEVEL;
      ball.troopDmg       = Math.floor(ball.troopDmg * 2.0);
      ball.cannonMissBonus = Math.min((ball.cannonMissBonus || 0) + 0.02, 0.95);
    } else if (ball.isShield) {
      ball.hitsToLevel = ball.ballLevel * HITS_PER_LEVEL;
      // Shield gets 0.5% more HP per level — compounds over time
      const shieldBoost = Math.floor(ball.maxHp * 0.005);
      ball.maxHp += shieldBoost;
      ball.hp     = Math.min(ball.hp + shieldBoost, ball.maxHp);
    } else if (ball.isKnight || ball.isKing) {
      ball.hitsToLevel = ball.ballLevel * HITS_PER_LEVEL;
      // 75% multiplicative boost to damage and HP per level up
      ball.troopDmg = Math.floor(ball.troopDmg * (1 + KNIGHT_KING_LEVEL_MULT));
      const hpBoost = Math.floor(ball.maxHp * KNIGHT_KING_LEVEL_MULT);
      ball.maxHp   += hpBoost;
      // Heal on level up (75% of current maxHp as heal)
      const healAmount = Math.floor(ball.maxHp * 0.30);
      ball.hp       = Math.min(ball.hp + hpBoost + healAmount, ball.maxHp);
    } else {
      ball.hitsToLevel = ball.ballLevel * HITS_PER_LEVEL;
      // Normal balls keep flat bonuses
      ball.troopDmg += DMG_BONUS;
      ball.maxHp    += HP_BONUS;
      const healAmount = 20;
      ball.hp        = Math.min(ball.hp + HP_BONUS + healAmount, ball.maxHp);
    }

    // Speed stays flat for all units
    ball.speed = Math.min(ball.speed + SPEED_BONUS, 3.0);
    if (!ball.isKnight && !ball.isKing) updateTroops(ball);
    // Check if stats have hit super threshold
    checkSuperStat(ball);
  }
}

// ---- BLOCK CHANCE ----
// Every ball has a 29% chance to fully block an incoming hit
// Knights have an additional 29% on top of their 90% armor reduction
const BLOCK_CHANCE = 0.29;

function tryBlock(ball) {
  return Math.random() < BLOCK_CHANCE;
}

// ---- SUPER STAT THRESHOLD ----
// When HP or damage reaches 8 quadrillion (near JS max safe integer)
// the unit ascends to Super Stats — immune to non-super damage, one-shots non-super
const SUPER_THRESHOLD = 8e15; // 8 quadrillion

function checkSuperStat(ball) {
  if (ball.hp <= 0) return;
  if (!ball.isSuperStat &&
     (ball.hp >= SUPER_THRESHOLD ||
      ball.maxHp >= SUPER_THRESHOLD ||
      ball.troopDmg >= SUPER_THRESHOLD)) {
    ball.isSuperStat  = true;
    ball.hp           = 999999999;
    ball.maxHp        = 999999999;
    ball.troopDmg     = 999999999;
  }
}

// ---- DAMAGE ----
// attacker parameter optional — used for super stat and reflect checks
function applyDamage(ball, dmg, attacker) {
  // ---- SUPER STAT IMMUNITY ----
  if (ball.isSuperStat && (!attacker || !attacker.isSuperStat)) return;
  if (attacker && attacker.isSuperStat && !ball.isSuperStat) {
    ball.hp = 0; ball.troops = 0; return;
  }
  // ---- HORSE IMMUNITY ----
  // Only knights, kings, hookers, MLVL cannons and mega knights can damage horse
  if (ball.isHorse && attacker) {
    const canDamage = attacker.isKnight || attacker.isKing || attacker.isHooker ||
                      (attacker.isCannon && attacker.ballLevel >= 2) ||
                      attacker.isMegaKnight || attacker.isVeteranKnight;
    if (!canDamage) return;
  }
  // ---- HOOKER DEFLECT ----
  // Hooker deflects ALL damage — only veteran knights and level 220+ kings can damage it
  if (ball.isHooker) {
    const isVeteranKnight = attacker && attacker.isVeteranKnight;
    const isHighLevelKing = attacker && attacker.isKing && attacker.ballLevel >= 220;
    if (!isVeteranKnight && !isHighLevelKing) return; // deflect everything else
  }
  // ---- MLVL SHIELD REFLECT ----
  // Attacker takes the same damage they deal to the MLVL shield
  if (ball.isMlvlShield && attacker && attacker !== ball) {
    attacker.hp -= dmg; // reflect — equal damage back
    if (!attacker.isKnight && !attacker.isKing) updateTroops(attacker);
  }
  // Emergency shield absorbs 99% of all damage
  if (ball.isEmergencyShield) {
    ball.hp -= dmg * 0.01;
    return;
  }
  // 29% chance to block the entire hit
  if (tryBlock(ball)) {
    ball.lastBlocked = true;
    return;
  }
  ball.lastBlocked = false;
  if (ball.isKnight) {
    ball.hp -= dmg * 0.10;
  } else {
    ball.hp -= dmg;
  }
}

function totalDmg(ball) {
  const surgeMult = (surgeActive && ball.team === surgeKingdomId) ? 4 : 1;
  return ball.troops * ball.troopDmg * surgeMult;
}

// ---- SPAWN MERCENARY ----
// Scales with highest alive kingdom level — becomes relevant all game
// At kingdom level 100+: stats multiply further
function spawnMercenary() {
  const highestKingdomLevel = Math.max(...kingdoms.filter(k => k.alive).map(k => k.level), 10);
  const isBuffed   = highestKingdomLevel >= 100;

  // Base merc level = highest kingdom level, minimum 10
  const mercLevel  = highestKingdomLevel;
  // HP scales with kingdom level — always threatening
  const mercHp     = isBuffed
    ? KNIGHT_HP * 6 + mercLevel * 200   // huge HP at 100+
    : KNIGHT_HP * 6 + mercLevel * 80;
  // Damage scales too
  const mercDmg    = isBuffed
    ? DMG_PER_TROOP * KNIGHT_DMG_MULT * 3 * (mercLevel / 10)
    : DMG_PER_TROOP * KNIGHT_DMG_MULT * 3;
  const mercRadius = Math.min(KNIGHT_RADIUS + 6 + (isBuffed ? mercLevel * 0.1 : 0), 48);
  const mercSpeed  = finalBattle
    ? Math.min(KNIGHT_SPEED * 4, 12)
    : halfBattle
      ? Math.min(KNIGHT_SPEED * 2, 12)
      : KNIGHT_SPEED * 1.5;

  balls.push({
    x: MX + MW / 2 + (Math.random() - 0.5) * 40,
    y: MY + MH / 2 + (Math.random() - 0.5) * 40,
    hp: mercHp, maxHp: mercHp,
    troops: 1, maxTroops: 1,
    troopDmg: mercDmg,
    isKnight: true,
    isKing:   false,
    isShield: false,
    isMerc:   true,
    team:     -1,
    color:    '#888888',
    cr: 136, cg: 136, cb: 136,
    ballLevel: mercLevel,
    hits: 0, hitsToLevel: mercLevel * HITS_PER_LEVEL,
    speed: mercSpeed,
    radius: mercRadius,
    fightTimer: 0,
    wobble: Math.random() * Math.PI * 2,
    trailX: MX + MW / 2, trailY: MY + MH / 2,
    swordAngle: 0, swordSwinging: false,
    siegeTimer: 0, siegeTarget: null,
    isRageBall: false,
    lastBlocked: false
  });
}

// ---- GAME STATE ----
let lastTime      = 0;
let gameOver      = false;
let winnerName    = '';
let finalBattle   = false;
let finalBattleAnnounced = false;
let halfBattle    = false;
let mercTimer     = 0;
// ---- SURGE SYSTEM ----
let surgeTimer     = 0;
let surgeKingdomId = -1;
let surgeActive    = false;
// ---- HOOKER TRASH TALK SYSTEM ----
let trashTalkTimer    = 0;
let trashTalkActive   = false;
let trashTalkDone     = false; // prevents retriggering
let trashTalkHookerId = -1;

// ---- MAIN LOOP ----
function update(ts) {
  const delta = Math.min(ts - lastTime, 50);
  lastTime = ts;

  if (gameOver) { drawAll(); drawGameOver(); return; }

  // Detect half battle — 4 kingdoms left = 2x speed
  const aliveCount = kingdoms.filter(k => k.alive).length;
  if (aliveCount === 4 && !halfBattle) {
    halfBattle = true;
    balls.forEach(ball => {
      ball.speed = Math.min(ball.speed * 2, 12.0);
    });
  }

  // Detect final battle — only 2 kingdoms left = 4x speed
  if (aliveCount === 2 && !finalBattle) {
    finalBattle = true;
    finalBattleAnnounced = true;
    // Boost ALL existing balls to 4x speed (2x on top of existing 2x)
    balls.forEach(ball => {
      ball.speed = Math.min(ball.speed * 2, 12.0);
    });
    // Start surge immediately — pick a random kingdom to surge first
    const twoKingdoms = kingdoms.filter(k => k.alive);
    surgeKingdomId = twoKingdoms[Math.floor(Math.random() * 2)].id;
    surgeActive    = true;
    surgeTimer     = 0;
  }

  // ---- SURGE SYSTEM ----
  // Runs during final battle — alternates every 30s between alive kingdoms
  // ---- SURGE SYSTEM ----
  // Always tick during finalBattle — instantly switch if surge kingdom dies
  if (finalBattle) {
    const surgeKingdom = kingdoms.find(k => k.id === surgeKingdomId && k.alive);
    if (!surgeKingdom) {
      // Surge kingdom died — immediately hand surge to the next alive kingdom
      const nextK = kingdoms.find(k => k.alive && k.id !== surgeKingdomId);
      if (nextK) {
        surgeKingdomId = nextK.id;
        surgeActive    = true;
        surgeTimer     = 0;
      }
    } else {
      surgeTimer += delta;
      if (surgeTimer >= 30000) {
        surgeTimer = 0;
        const other = kingdoms.find(k => k.alive && k.id !== surgeKingdomId);
        if (other) surgeKingdomId = other.id;
      }
    }
  }

  // Speed multiplier for newly spawned balls
  const speedMult = finalBattle ? 4.0 : halfBattle ? 2.0 : 1.0;

  // ---- HOOKER TRASH TALK TIMER ----
  if (finalBattle) {
    const aliveKingdoms = kingdoms.filter(k => k.alive);
    if (aliveKingdoms.length === 2) {
      aliveKingdoms.forEach(k => {
        const hooker = balls.find(b => b.isHooker && b.team === k.id);
        if (hooker) {
          const enemy = aliveKingdoms.find(e => e.id !== k.id);
          const enemyHasStrongKing = balls.some(b =>
            b.isKing && b.team === enemy.id && b.ballLevel >= 220
          );
          if (!enemyHasStrongKing && !trashTalkActive && !trashTalkDone) {
            trashTalkActive   = true;
            trashTalkTimer    = 0;
            trashTalkHookerId = k.id;
          }
        }
      });
    }
  }

  if (trashTalkActive) {
    trashTalkTimer += delta;
    if (trashTalkTimer >= 5000) {
      // 5s up — spawn a hooker directly at the enemy kingdom to clear troops
      trashTalkActive = false;
      trashTalkDone   = true; // never triggers again this game
      const hookerKingdom = kingdoms.find(k => k.id === trashTalkHookerId);
      if (hookerKingdom) {
        const aliveKingdoms = kingdoms.filter(k => k.alive);
        const enemy = aliveKingdoms.find(k => k.id !== trashTalkHookerId);
        if (enemy) {
          // Spawn hooker right at the enemy kingdom — starts hooking defenders immediately
          const angle  = Math.random() * Math.PI * 2;
          const kingHp = hookerKingdom.level * 80 + (KNIGHT_HP * 4);
          const hookerHp = kingHp * 8 * 4;
          balls.push({
            x: enemy.x + Math.cos(angle) * 30,
            y: enemy.y + Math.sin(angle) * 30,
            hp: hookerHp, maxHp: hookerHp,
            troops: 1, maxTroops: 1, troopDmg: 0,
            isKnight: false, isKing: false, isShield: false,
            isCannon: false, isRammer: false, isHooker: true,
            ballLevel: 1, hits: 0, hitsToLevel: HITS_PER_LEVEL,
            speed: Math.min(1.5 * speedMult, 12.0), radius: 20,
            hookTimer: 0, hookCooldown: 1500, // faster cooldown — aggressive
            hookedTarget: null,
            team: hookerKingdom.id, color: hookerKingdom.color,
            cr: hookerKingdom.r, cg: hookerKingdom.g, cb: hookerKingdom.b,
            fightTimer: 0, wobble: Math.random() * Math.PI * 2,
            trailX: enemy.x, trailY: enemy.y,
            swordAngle: 0, swordSwinging: false,
            siegeTimer: 0, siegeTarget: null,
            isRageBall: false, lastBlocked: false
          });
        }
      }
    }
  }

  // ---- MERCENARY SPAWN TIMER ----
  // 30s normal, 7.5s during final battle (accounts for 4x speed)
  const mercInterval = finalBattle ? 7500 : 30000;
  mercTimer += delta;
  if (mercTimer >= mercInterval) {
    spawnMercenary();
    mercTimer = 0;
  }

  // Kingdom timers
  kingdoms.forEach(k => {
    if (!k.alive) return;
    k.timer += delta;
    if (k.timer >= k.spawnRate) {
      k.spawnCount++;
      // Check if this is a rammer tick (every 3rd)
      const isRammerTick  = k.spawnCount % 3  === 0;
      const isCannonTick  = k.spawnCount % 10 === 0;
      const isShieldTick  = k.spawnCount % 5  === 0;
      // Elite knight spawns separately via eliteTimer, not here

      // If rammer overlaps with cannon/shield, spawn BOTH
      if (isCannonTick && isRammerTick) {
        spawnCannon(k, speedMult);
        spawnRammer(k, speedMult);
      } else if (isShieldTick && isRammerTick) {
        spawnShield(k);
        spawnRammer(k, speedMult);
      } else if (isCannonTick) {
        spawnCannon(k, speedMult);
      } else if (isShieldTick) {
        spawnShield(k);
      } else if (isRammerTick) {
        spawnRammer(k, speedMult);
      } else {
        spawnBall(k, speedMult);
      }
      k.timer = 0;
    }
    // Surge: 4x upgrade speed for the surging kingdom
    const surgeUpgradeMult = (surgeActive && k.id === surgeKingdomId) ? 4 : 1;
    k.upgradeTimer += delta * surgeUpgradeMult;
    if (k.upgradeTimer >= 16000) {
      k.level++;
      k.spawnRate    = Math.max(800, k.spawnRate - 200);
      k.upgradeTimer = 0;
      // ---- LEVEL 300 MILESTONE: full heal to 300k ----
      if (k.level === 300) {
        k.maxHp = 3000000;
        k.hp    = 3000000;
      }
    }
    // ---- ELITE KNIGHT: spawns every 30s (7.5s during final battle 4x speed) ----
    if (!k.eliteTimer) k.eliteTimer = 0;
    k.eliteTimer += delta;
    const eliteCooldown = finalBattle ? 7500 : 30000;
    const knightsThisKingdom = balls.filter(b => b.isKnight && !b.isMerc && !b.isMegaKnight && b.team === k.id).length;
    if (k.eliteTimer >= eliteCooldown && knightsThisKingdom < 100) {
      spawnEliteKnight(k, speedMult);
      k.eliteTimer = 0;
    }

    // ---- MEGA KNIGHT CONVERSION ----
    // When a kingdom has 15+ regular knights, consume them and spawn 1 mega knight
    if (knightsThisKingdom >= 15) {
      // Remove 15 regular knights from this kingdom
      let removed = 0;
      balls = balls.filter(b => {
        if (removed < 15 && b.isKnight && !b.isMerc && !b.isMegaKnight && b.team === k.id) {
          removed++;
          return false;
        }
        return true;
      });
      // Spawn 1 mega knight in their place
      const megaHp  = (KNIGHT_HP + HP_BONUS * 9) * 15 * 3; // 3x the combined HP
      const megaDmg = (DMG_PER_TROOP * KNIGHT_DMG_MULT) * 15 * 2; // 2x combined damage
      const ang     = Math.random() * Math.PI * 2;
      balls.push({
        x: k.x + Math.cos(ang) * 22,
        y: k.y + Math.sin(ang) * 22,
        hp: megaHp, maxHp: megaHp,
        troops: 1, maxTroops: 1,
        troopDmg: megaDmg,
        isKnight: true, isEliteKnight: true,
        isMegaKnight: true,
        isCompactedKnight: false,
        isKing: false, isShield: false, isCannon: false, isRammer: false,
        ballLevel: 1, hits: 0, hitsToLevel: 3,
        speed: Math.min(KNIGHT_SPEED * speedMult * 1.2, 12.0),
        radius: 30,
        team: k.id, color: k.color,
        cr: k.r, cg: k.g, cb: k.b,
        fightTimer: 0, wobble: Math.random() * Math.PI * 2,
        trailX: k.x, trailY: k.y,
        swordAngle: 0, swordSwinging: false,
        siegeTimer: 0, siegeTarget: null,
        isRageBall: false, lastBlocked: false
      });
    }

    // ---- HOOKER TOKEN: auto spawn when kingdom drops below 25% HP — ONE TIME ONLY ----
    if (k.hookerToken && k.hp / k.maxHp < 0.25) {
      k.hookerToken = false;
      const alreadyHasHooker = balls.some(b => b.isHooker && b.team === k.id);
      if (!alreadyHasHooker) spawnHooker(k, speedMult);
    }

    // ---- EMERGENCY SHIELD: spawns when kingdom drops below 1% HP ----
    // This shield has 99% damage reduction — nearly impenetrable
    const hpPercent = k.hp / k.maxHp;
    if (hpPercent < 0.01 && !k.lastShieldSpawned) {
      k.lastShieldSpawned = true;
      // Spawn a special emergency shield with 99% damage reduction
      const emergencyHp = k.maxHp * 50; // massive HP
      balls.push({
        x: k.x, y: k.y,
        hp: emergencyHp, maxHp: emergencyHp,
        troops: 1, maxTroops: 1,
        troopDmg: 0,
        isKnight: false, isKing: false,
        isShield: true,
        isEmergencyShield: true, // 99% damage reduction flag
        ballLevel: 1, hits: 0, hitsToLevel: HITS_PER_LEVEL,
        speed: 0.3,
        radius: 28,
        homeX: k.x, homeY: k.y,
        team: k.id, color: k.color,
        cr: k.r, cg: k.g, cb: k.b,
        fightTimer: 0,
        wobble: Math.random() * Math.PI * 2,
        trailX: k.x, trailY: k.y,
        swordAngle: 0, swordSwinging: false,
        siegeTimer: 0, siegeTarget: null,
        isRageBall: false, lastBlocked: false
      });
    }
    // Reset so it can spawn again if HP recovers above 1% then drops again
    if (hpPercent >= 0.01) k.lastShieldSpawned = false;
    // ---- LEVEL 150+: spawn ONE compacted knight ball with multiple knights inside ----
    // Level 150 = 1 knight inside, Level 151 = 2 knights inside, etc.
    // Works exactly like normal balls — one ball, number shows knights inside
    if (k.level >= 150 && k.timer === 0) {
      const knightCount = k.level - 149; // knights packed inside
      const fixedLevel  = 10;
      const fixedDmg    = (DMG_PER_TROOP * KNIGHT_DMG_MULT + (DMG_BONUS * 2 * (fixedLevel - 1))) * knightCount;
      const fixedHp     = (KNIGHT_HP + (HP_BONUS * (fixedLevel - 1))) * knightCount;
      const fixedRadius = Math.min(KNIGHT_RADIUS + knightCount * 1.5, 52);
      const fixedSpeed  = Math.min(KNIGHT_SPEED * speedMult, 12.0);
      const ang         = Math.random() * Math.PI * 2;
      balls.push({
        x: k.x + Math.cos(ang) * 20,
        y: k.y + Math.sin(ang) * 20,
        hp: fixedHp, maxHp: fixedHp,
        troops: knightCount, maxTroops: knightCount, // shows count like normal balls
        troopDmg: fixedDmg / knightCount,            // per knight damage
        isKnight: true, isEliteKnight: true,
        isCompactedKnight: true,                      // compacted flag
        isKing: false, isShield: false, isCannon: false, isRammer: false,
        ballLevel: fixedLevel, hits: 0, hitsToLevel: fixedLevel * HITS_PER_LEVEL,
        speed: fixedSpeed, radius: fixedRadius,
        team: k.id, color: k.color,
        cr: k.r, cg: k.g, cb: k.b,
        fightTimer: 0, wobble: Math.random() * Math.PI * 2,
        trailX: k.x, trailY: k.y,
        swordAngle: 0, swordSwinging: false,
        siegeTimer: 0, siegeTarget: null,
        isRageBall: false, lastBlocked: false
      });
    }

    // ---- CANNON UPGRADE: 5 LV1 cannons → 1 MLVL cannon ----
    if (k.level >= 10) {
      const lv1Cannons = balls.filter(b => b.isCannon && b.ballLevel === 1 && b.team === k.id);
      if (lv1Cannons.length >= 5) {
        // Remove 5 LV1 cannons
        let removed = 0;
        balls = balls.filter(b => {
          if (removed < 5 && b.isCannon && b.ballLevel === 1 && b.team === k.id) {
            removed++; return false;
          }
          return true;
        });
        // Spawn 1 MLVL cannon with 8 level ups applied immediately
        const ang = Math.random() * Math.PI * 2;
        let mlvlCannonDmg = CANNON_DAMAGE;
        let mlvlCannonHp  = KNIGHT_HP;
        for (let i = 0; i < 8; i++) {
          mlvlCannonDmg = Math.floor(mlvlCannonDmg * 2.0);
          mlvlCannonHp  = Math.floor(mlvlCannonHp + mlvlCannonHp * 0.005);
        }
        balls.push({
          x: k.x + Math.cos(ang) * 22, y: k.y + Math.sin(ang) * 22,
          hp: mlvlCannonHp, maxHp: mlvlCannonHp,
          troops: 1, maxTroops: 1, troopDmg: mlvlCannonDmg,
          isKnight: false, isKing: false, isShield: false, isCannon: true,
          ballLevel: 9, hits: 0, hitsToLevel: 9 * HITS_PER_LEVEL,
          speed: Math.min(1.2 * speedMult, 12.0), radius: 22,
          attackTimer: 0, fireCooldown: 10000,
          team: k.id, color: k.color, cr: k.r, cg: k.g, cb: k.b,
          fightTimer: 0, wobble: Math.random() * Math.PI * 2,
          trailX: k.x, trailY: k.y, swordAngle: 0, swordSwinging: false,
          siegeTimer: 0, siegeTarget: null, isRageBall: false, lastBlocked: false, lastFired: false
        });
      }
    }

    // ---- RAMMER UPGRADE: 5 LV1 rammers → 1 MLVL rammer ----
    const lv1Rammers = balls.filter(b => b.isRammer && !b.isMlvlRammer && b.team === k.id);
    if (lv1Rammers.length >= 5) {
      let removed = 0;
      balls = balls.filter(b => {
        if (removed < 5 && b.isRammer && !b.isMlvlRammer && b.team === k.id) {
          removed++; return false;
        }
        return true;
      });
      const ang = Math.random() * Math.PI * 2;
      let mlvlRamDmg        = DMG_PER_TROOP * RAMMER_DMG_MULT * 3;
      let mlvlRamMissBonus  = 0;
      for (let i = 0; i < 8; i++) {
        mlvlRamDmg       = Math.floor(mlvlRamDmg * 2.0);
        mlvlRamMissBonus = Math.min(mlvlRamMissBonus + 0.02, 0.95);
      }
      balls.push({
        x: k.x + Math.cos(ang) * 20, y: k.y + Math.sin(ang) * 20,
        hp: KNIGHT_HP * 6, maxHp: KNIGHT_HP * 6,
        troops: 1, maxTroops: 1, troopDmg: mlvlRamDmg,
        isKnight: false, isKing: false, isShield: false, isCannon: false,
        isRammer: true, isMlvlRammer: true,
        ballLevel: 9, hits: 0, hitsToLevel: 9 * HITS_PER_LEVEL,
        cannonMissBonus: mlvlRamMissBonus,
        speed: Math.min(2.4 * speedMult, 12.0), radius: 28,
        team: k.id, color: k.color, cr: k.r, cg: k.g, cb: k.b,
        fightTimer: 0, wobble: Math.random() * Math.PI * 2,
        trailX: k.x, trailY: k.y, swordAngle: 0, swordSwinging: false,
        siegeTimer: 0, siegeTarget: null, isRageBall: false, lastBlocked: false,
        lastFired: false, ramTimer: 0, ramCooldown: 1500, currentRamTarget: null, isRamming: false
      });
    }

    // ---- SHIELD UPGRADE: 5 LV1 shields → 1 MLVL shield ----
    // MLVL shield: 2x HP, reflects all damage back to attacker
    const lv1Shields = balls.filter(b => b.isShield && !b.isMlvlShield && !b.isEmergencyShield && !b.isEliteKingShield && b.team === k.id);
    if (lv1Shields.length >= 5) {
      // Consume 5 LV1 shields
      let removed = 0;
      balls = balls.filter(b => {
        if (removed < 5 && b.isShield && !b.isMlvlShield && !b.isEmergencyShield && !b.isEliteKingShield && b.team === k.id) {
          removed++; return false;
        }
        return true;
      });
      // Spawn 1 MLVL shield
      const kingHp   = k.level * 80 + (KNIGHT_HP * 4);
      const shieldHp = kingHp * 8 * 2; // 2x the normal shield HP
      const ang      = Math.random() * Math.PI * 2;
      balls.push({
        x: k.x + Math.cos(ang) * 30, y: k.y + Math.sin(ang) * 30,
        hp: shieldHp, maxHp: shieldHp,
        troops: 1, maxTroops: 1, troopDmg: 0,
        isKnight: false, isKing: false,
        isShield: true, isMlvlShield: true, // reflect flag
        ballLevel: 1, hits: 0, hitsToLevel: HITS_PER_LEVEL,
        speed: 0.5, radius: Math.min(28 + k.level * 2, 52),
        homeX: k.x, homeY: k.y,
        team: k.id, color: k.color, cr: k.r, cg: k.g, cb: k.b,
        fightTimer: 0, wobble: Math.random() * Math.PI * 2,
        trailX: k.x, trailY: k.y, swordAngle: 0, swordSwinging: false,
        siegeTimer: 0, siegeTarget: null, isRageBall: false, lastBlocked: false
      });
    }

    // ---- GLOBAL BALL CAP: max 500 balls total to prevent lag ----
    if (balls.length > 500) {
      // Remove oldest non-knight non-king non-shield balls first
      const removable = balls.filter(b => !b.isKnight && !b.isKing && !b.isShield && !b.isCannon);
      if (removable.length > 0) balls.splice(balls.indexOf(removable[0]), 1);
    }
  });

  // Ball update
  balls.forEach(ball => {
    ball.wobble += 0.04;
    ball.trailX  = ball.x;
    ball.trailY  = ball.y;

    // ---- STUNNED: skip all movement and combat ----
    if (ball.isStunned && ball.stunTimer > 0) return;

    // Sword swing animation
    if (ball.swordSwinging) {
      ball.swordAngle += 0.18;
      if (ball.swordAngle > Math.PI * 1.2) {
        ball.swordAngle    = 0;
        ball.swordSwinging = false;
      }
    }

    // Find nearest enemy ball
    // Mercs (team -1) treat everyone as enemy, everyone treats mercs as enemy
    const enemies = ball.isMerc
      ? balls.filter(b => b !== ball)
      : balls.filter(b => b.team !== ball.team || b.isMerc);

    // ---- ROYAL SHIELD PRIORITY ----
    // If targeting a king but there's a royal shield nearby, target the shield instead
    let nearest;
    if (!ball.isKing && !ball.isMerc) {
      const royalShields = enemies.filter(e => e.isEliteKingShield);
      const nearestRoyal = royalShields.length
        ? royalShields.reduce((a, b) => getDist(ball, a) < getDist(ball, b) ? a : b)
        : null;
      // If a royal shield is within 200px prioritize it over everything else
      if (nearestRoyal && getDist(ball, nearestRoyal) < 200) {
        nearest = nearestRoyal;
      } else {
        nearest = enemies.length
          ? enemies.reduce((a, b) => getDist(ball, a) < getDist(ball, b) ? a : b)
          : null;
      }
    } else {
      // Kings and mercs target normally — king attacks freely
      nearest = enemies.length
        ? enemies.filter(e => !e.isEliteKingShield || ball.isKing)
            .reduce((a, b) => getDist(ball, a) < getDist(ball, b) ? a : b, enemies[0])
        : null;
    }
    const nearDist = nearest ? getDist(ball, nearest) : 999999;

    // ---- SHIELD SPECIAL BEHAVIOR ----
    // Shield stays near home kingdom and intercepts incoming enemies
    if (ball.isShield) {
      const homeDist = getDist(ball, { x: ball.homeX, y: ball.homeY });
      // If an enemy is close to home, move to intercept it
      const threatRadius = 80;
      const threat = enemies.find(e => {
        const distToHome = getDist(e, { x: ball.homeX, y: ball.homeY });
        return distToHome < threatRadius;
      });
      if (threat) {
        const ang = Math.atan2(threat.y - ball.y, threat.x - ball.x);
        ball.x += Math.cos(ang) * ball.speed * 2;
        ball.y += Math.sin(ang) * ball.speed * 2;
      } else if (homeDist > 40) {
        // Drift back to kingdom if no threat nearby
        const ang = Math.atan2(ball.homeY - ball.y, ball.homeX - ball.x);
        ball.x += Math.cos(ang) * ball.speed;
        ball.y += Math.sin(ang) * ball.speed;
      }
      // Shields take combat hits but deal zero damage — still need to process combat
      if (nearest && nearDist < ball.radius + nearest.radius + 4) {
        ball.fightTimer += delta;
        if (ball.fightTimer >= 800) {
          applyDamage(ball, totalDmg(nearest), nearest); // shield takes damage
          // nearest deals damage to shield but shield deals 0 back
          ball.hits++;
          updateTroops(ball);
          checkLevelUp(ball);
          ball.fightTimer = 0;
        }
      }
      ball.x = Math.max(MX + 14, Math.min(MX + MW - 14, ball.x));
      ball.y = Math.max(MY + 14, Math.min(MY + MH - 14, ball.y));
      return; // skip normal ball logic
    }

    // ---- HORSE KNIGHT SPECIAL BEHAVIOR ----
    // Only targets cannons — charges through everything else
    if (ball.isHorse) {
      // Find nearest enemy cannon
      const enemyCannons = enemies.filter(e => e.isCannon);
      if (enemyCannons.length > 0) {
        ball.horseTarget = enemyCannons.reduce((a, b) =>
          getDist(ball, a) < getDist(ball, b) ? a : b
        );
      } else {
        ball.horseTarget = null;
      }

      if (ball.horseTarget && ball.horseTarget.hp > 0) {
        // Charge toward cannon at full speed
        const ang = Math.atan2(ball.horseTarget.y - ball.y, ball.horseTarget.x - ball.x);
        ball.x += Math.cos(ang) * ball.speed;
        ball.y += Math.sin(ang) * ball.speed;

        // On contact — instant kill the cannon
        if (getDist(ball, ball.horseTarget) < ball.radius + ball.horseTarget.radius + 4) {
          ball.horseTarget.hp     = 0;
          ball.horseTarget.troops = 0;
          ball.hits++;
          checkLevelUp(ball);
          ball.horseTarget = null;
        }
      } else {
        // No cannons — march toward nearest enemy
        if (nearest) {
          const ang = Math.atan2(nearest.y - ball.y, nearest.x - ball.x);
          ball.x += Math.cos(ang) * ball.speed * 0.5;
          ball.y += Math.sin(ang) * ball.speed * 0.5;
        }
      }

      ball.x = Math.max(MX + 14, Math.min(MX + MW - 14, ball.x));
      ball.y = Math.max(MY + 14, Math.min(MY + MH - 14, ball.y));
      return;
    }

    // ---- HOOKER SPECIAL BEHAVIOR ----
    // Roams toward enemies, hooks one and traps it until dead
    if (ball.isHooker) {
      ball.hookTimer += delta;

      // Clear hooked target if it died
      if (ball.hookedTarget && ball.hookedTarget.hp <= 0) {
        ball.hookedTarget = null;
      }

      // If holding a target — lock it to hooker position and deal 25% HP damage
      if (ball.hookedTarget) {
        const ht = ball.hookedTarget;
        // Keep trapped ball stuck near hooker
        ht.x = ball.x + 30;
        ht.y = ball.y;
        ht.speed = 0;
        // Deal 25% max HP damage on cooldown
        if (ball.hookTimer >= ball.hookCooldown) {
          ht.hp -= ht.maxHp * 0.25;
          ht.hp  = Math.max(0, ht.hp);
          updateTroops(ht);
          ball.hits++;
          checkLevelUp(ball);
          ball.hookTimer = 0;
        }
      } else {
        // No target — pick a random enemy from the ENTIRE field (infinite range)
        if (ball.hookTimer >= ball.hookCooldown && enemies.length > 0) {
          // Pick random enemy — can pull anyone including kings
          const validTargets = enemies.filter(e => !e.isHooker && !e.isShield);
          if (validTargets.length) {
            ball.hookedTarget = validTargets[Math.floor(Math.random() * validTargets.length)];
          }
          ball.hookTimer = 0;
        }
        // Wander toward nearest enemy slowly
        if (nearest) {
          const ang = Math.atan2(nearest.y - ball.y, nearest.x - ball.x);
          ball.x += Math.cos(ang) * ball.speed * 0.5;
          ball.y += Math.sin(ang) * ball.speed * 0.5;
        }
      }

      ball.x = Math.max(MX + 14, Math.min(MX + MW - 14, ball.x));
      ball.y = Math.max(MY + 14, Math.min(MY + MH - 14, ball.y));
      return;
    }

    // ---- WIZARD SPECIAL BEHAVIOR ----
    // Alternates: freeze (5s stun) → fireball (2x knight dmg ranged) → repeat
    if (ball.isWizard) {
      ball.wizardTimer += delta;
      ball.wizardFreezeTarget = null;
      ball.wizardFireTarget   = null;

      // Wander toward nearest enemy at moderate speed
      if (nearest) {
        const ang = Math.atan2(nearest.y - ball.y, nearest.x - ball.x);
        ball.x += Math.cos(ang) * ball.speed * 0.6;
        ball.y += Math.sin(ang) * ball.speed * 0.6;
      }

      if (ball.wizardTimer >= ball.wizardCooldown && enemies.length > 0) {
        ball.wizardTimer = 0;

        if (ball.wizardAbilityIndex === 0) {
          // ---- FREEZE ----
          // Target nearest enemy — stun for 5s regardless of immunity
          if (nearest) {
            nearest.isStunned   = true;
            nearest.stunTimer   = ball.wizardFreezeDuration;
            nearest.stunImmunity = 0;
            nearest.stunTeam    = ball.team;
            ball.wizardFreezeTarget = nearest;
            ball.hits++;
            checkLevelUp(ball);
          }
          ball.wizardAbilityIndex = 1; // next: fireball
        } else {
          // ---- FIREBALL ----
          // Ranged — hits nearest enemy within 120px for 2x knight damage
          const fireTarget = enemies.find(e => getDist(ball, e) < 120);
          if (fireTarget) {
            applyDamage(fireTarget, ball.troopDmg, ball);
            updateTroops(fireTarget);
            ball.wizardFireTarget = fireTarget;
            ball.hits++;
            checkLevelUp(ball);
          }
          ball.wizardAbilityIndex = 0; // next: freeze
        }
      }

      ball.x = Math.max(MX + 14, Math.min(MX + MW - 14, ball.x));
      ball.y = Math.max(MY + 14, Math.min(MY + MH - 14, ball.y));
      return;
    }

    // ---- WIZARD SPECIAL BEHAVIOR ----
    // Alternates freeze → fireball → freeze → fireball on cooldown
    // Freeze: 5s stun on any enemy, Fireball: 2x knight dmg at 130px range
    // Weakness: takes damage from everything, no deflection
    if (ball.isWizard) {
      ball.wizardTimer += delta;
      // Tick down visual flash
      if (ball.wizardFlashTimer > 0) ball.wizardFlashTimer -= delta;

      // Wander slowly toward nearest enemy
      if (nearest) {
        const ang = Math.atan2(nearest.y - ball.y, nearest.x - ball.x);
        ball.x += Math.cos(ang) * ball.speed * 0.6;
        ball.y += Math.sin(ang) * ball.speed * 0.6;
      }

      // Fire ability on cooldown
      if (ball.wizardTimer >= ball.wizardCooldown && enemies.length > 0) {
        ball.wizardTimer = 0;

        if (ball.wizardAbilityIndex === 0) {
          // ---- FREEZE ----
          // Pick random non-frozen enemy
          const freezeable = enemies.filter(e => !e.isStunned);
          if (freezeable.length > 0) {
            const target = freezeable[Math.floor(Math.random() * freezeable.length)];
            target.isStunned  = true;
            target.stunTimer  = 5000; // 5s freeze
            target.stunTeam   = ball.team;
            target.stunImmunity = 0;
            ball.wizardFreezeTarget = target;
            ball.wizardLastAbility  = 'freeze';
            ball.wizardFlashTimer   = 600;
            ball.hits++;
            checkLevelUp(ball);
          }
          ball.wizardAbilityIndex = 1; // next: fireball

        } else {
          // ---- FIREBALL ----
          // Ranged attack on nearest enemy within 130px
          const fireTarget = enemies.find(e => getDist(ball, e) <= 130);
          if (fireTarget) {
            applyDamage(fireTarget, ball.troopDmg, ball);
            updateTroops(fireTarget);
            ball.wizardFireTarget  = fireTarget;
            ball.wizardLastAbility = 'fireball';
            ball.wizardFlashTimer  = 600;
            ball.hits++;
            checkLevelUp(ball);
          }
          ball.wizardAbilityIndex = 0; // next: freeze
        }
      }

      // Takes contact damage like any normal unit (no deflection)
      if (nearest && getDist(ball, nearest) < ball.radius + nearest.radius + 4) {
        ball.fightTimer += delta;
        if (ball.fightTimer >= 800) {
          applyDamage(ball, totalDmg(nearest), nearest);
          ball.fightTimer = 0;
        }
      } else {
        ball.fightTimer = 0;
      }

      ball.x = Math.max(MX + 14, Math.min(MX + MW - 14, ball.x));
      ball.y = Math.max(MY + 14, Math.min(MY + MH - 14, ball.y));
      return;
    }

    // ---- CANNON SPECIAL BEHAVIOR ----
    // Attacks from long range, one-shots shields, dies in one hit
    if (ball.isCannon) {
      ball.lastFired = false;
      ball.attackTimer += delta;

      // ---- CANNON MLVL UPGRADE ----
      // Handled in kingdom timer — 5 cannons consumed → 1 MLVL cannon spawned
      const ownerKingdom = kingdoms.find(k => k.id === ball.team);
      // Use upgraded cooldown if level 2, else default 1200ms
      const fireCooldown = ball.ballLevel >= 2 ? (ball.fireCooldown || 10000) : 1200;

      // Find nearest enemy in long range
      const cannonTarget = enemies.length
        ? enemies.reduce((a, b) => getDist(ball, a) < getDist(ball, b) ? a : b)
        : null;
      const cannonDist = cannonTarget ? getDist(ball, cannonTarget) : 999999;

      if (cannonTarget && cannonDist <= CANNON_RANGE && ball.attackTimer >= fireCooldown) {
        // ---- MISS CHANCE ----
        // Normal balls: 25% miss, Knights: 50% miss, Kings: 75% miss
        // MLVL Rammers add cannonMissBonus per level
        let missChance = 0.25;
        if (cannonTarget.isKing)        missChance = 0.75;
        else if (cannonTarget.isKnight) missChance = 0.50;
        else if (cannonTarget.isHorse)  missChance = 1.0; // 100% miss — cannons can't hit horses
        // Add rammer's earned cannon miss bonus
        if (cannonTarget.isRammer && cannonTarget.cannonMissBonus) {
          missChance = Math.min(missChance + cannonTarget.cannonMissBonus, 0.95);
        }
        const missed = Math.random() < missChance;

        ball.lastFired = true;
        ball.lastMissed = missed;
        ball.attackTimer = 0;

        if (!missed) {
          // Hit! Instant kill on shields
          if (cannonTarget.isShield) {
            cannonTarget.hp = 0;
          } else if (
            ball.ballLevel >= 2 &&
            !cannonTarget.isKnight &&
            !cannonTarget.isKing &&
            cannonTarget.troops >= 150
          ) {
            // MLVL cannon vs 150+ troop ball — takes 5 hits to die
            // Deal exactly 1/5 of their max HP per shot
            const dmg = Math.ceil(cannonTarget.maxHp / 5);
            applyDamage(cannonTarget, dmg, ball);
          } else {
            applyDamage(cannonTarget, CANNON_DAMAGE, ball);
          }
          updateTroops(cannonTarget);
          ball.hits++;
          checkLevelUp(ball);
        }
      } else if (!cannonTarget || cannonDist > CANNON_RANGE) {
        // March toward nearest enemy if out of range
        if (cannonTarget) {
          const ang = Math.atan2(cannonTarget.y - ball.y, cannonTarget.x - ball.x);
          const wa  = ang + Math.sin(ball.wobble) * 0.08;
          ball.x += Math.cos(wa) * ball.speed;
          ball.y += Math.sin(wa) * ball.speed;
        }
      }
      // Cannon takes full contact damage if enemy touches it — dies in 1 hit anyway
      if (nearest && nearDist < ball.radius + nearest.radius + 4) {
        applyDamage(ball, totalDmg(nearest), nearest);
      }
      ball.x = Math.max(MX + 14, Math.min(MX + MW - 14, ball.x));
      ball.y = Math.max(MY + 14, Math.min(MY + MH - 14, ball.y));
      return; // skip normal ball logic
    }

    // ---- RAMMER SPECIAL BEHAVIOR ----
    // Picks a random enemy, charges at it, stuns on contact
    // Stun duration: Ball=5s, Knight=3s, King=0.5s, Shield=immune
    if (ball.isRammer) {
      ball.ramTimer += delta;

      // Tick down stun and stun immunity on all balls
      balls.forEach(b => {
        if (b.stunTimer > 0) {
          b.stunTimer -= delta;
          if (b.stunTimer <= 0) {
            b.stunTimer      = 0;
            b.isStunned      = false;
            b.stunImmunity   = 7000; // 7s immunity after unstun
          }
        }
        if (b.stunImmunity > 0) {
          b.stunImmunity -= delta;
          if (b.stunImmunity <= 0) b.stunImmunity = 0;
        }
      });

      // Pick a new random target every ramCooldown ms
      if (ball.ramTimer >= ball.ramCooldown || !ball.currentRamTarget) {
        // Rammers can now target shields — but hitting one stuns the rammer!
        const validTargets = enemies.filter(e => !e.stunImmunity || e.stunImmunity <= 0);
        if (validTargets.length) {
          const randIdx = Math.floor(Math.random() * validTargets.length);
          ball.currentRamTarget = validTargets[randIdx];
        }
        ball.ramTimer = 0;
      }

      const rt = ball.currentRamTarget;
      if (rt && rt.hp > 0) {
        // Charge toward ram target at high speed
        const ang = Math.atan2(rt.y - ball.y, rt.x - ball.x);
        ball.x += Math.cos(ang) * ball.speed * 1.8;
        ball.y += Math.sin(ang) * ball.speed * 1.8;

        // On contact
        if (getDist(ball, rt) < ball.radius + rt.radius + 4) {
          // ---- SHIELD STUNS THE RAMMER ----
          if (rt.isShield) {
            ball.isStunned  = true;
            ball.stunTimer  = 3000; // 3s stun on rammer
            ball.stunImmunity = 0;
            ball.currentRamTarget = null;
            ball.ramTimer = ball.ramCooldown;
          } else if (rt.stunImmunity && rt.stunImmunity > 0) {
            // Stun immune target — back off with full cooldown
            ball.currentRamTarget = null;
            ball.ramTimer = ball.ramCooldown;
          } else if (Math.random() < 0.25) {
            // 25% miss — full cooldown before picking new target
            ball.currentRamTarget = null;
            ball.ramTimer = ball.ramCooldown;
          } else {
            // ---- PHYSICS COLLISION ----
            // Knights have armor — they hit back with equal force
            // Normal balls and kings are unarmored — ram takes no damage
            const dmgToTarget = totalDmg(ball);
            const dmgToRammer = rt.isKnight
              ? dmgToTarget   // knight armor = equal recoil damage
              : 0;            // naked target = no recoil
            applyDamage(rt,   dmgToTarget, ball);
            if (dmgToRammer > 0) applyDamage(ball, dmgToRammer, rt);
            // Apply stun based on target type (shields immune, immunity immune)
            if (!rt.isShield && (!rt.stunImmunity || rt.stunImmunity <= 0)) {
              rt.isStunned  = true;
              rt.stunTeam   = ball.team;
              rt.stunImmunity = 0;
              if (rt.isKing)         rt.stunTimer = 500;
              else if (rt.isKnight)  rt.stunTimer = 3000;
              else                   rt.stunTimer = 5000;
            }
            updateTroops(rt);
            updateTroops(ball);
            ball.hits++;
            checkLevelUp(ball);
            ball.currentRamTarget = null;
            ball.ramTimer = ball.ramCooldown;
          }
        }
      } else {
        // Target dead — march toward nearest enemy
        if (nearest) {
          const ang = Math.atan2(nearest.y - ball.y, nearest.x - ball.x);
          ball.x += Math.cos(ang) * ball.speed;
          ball.y += Math.sin(ang) * ball.speed;
        }
        ball.currentRamTarget = null;
      }

      ball.x = Math.max(MX + 14, Math.min(MX + MW - 14, ball.x));
      ball.y = Math.max(MY + 14, Math.min(MY + MH - 14, ball.y));
      return;
    }

    if (nearest && nearDist < ball.radius + nearest.radius + 4) {
      // ---- COMBAT ----
      ball.fightTimer += delta;
      if (ball.fightTimer >= 800) {
        applyDamage(nearest, totalDmg(ball), ball);
        applyDamage(ball,    totalDmg(nearest), nearest);
        ball.hits++;
        nearest.hits++;
        updateTroops(ball);
        updateTroops(nearest);
        checkLevelUp(ball);
        checkLevelUp(nearest);
        checkSuperStat(ball);
        checkSuperStat(nearest);
        ball.fightTimer       = 0;
        ball.swordSwinging    = true;
        nearest.swordSwinging = true;
      }
    } else {
      // ---- MARCH ----
      // Only march if not currently sieging a kingdom
      if (ball.siegeTarget === null) {
        ball.fightTimer = 0;
        let tx = ball.x, ty = ball.y;

        if (nearest && nearDist < 160) {
          tx = nearest.x; ty = nearest.y;
        } else {
          // Mercs target any alive kingdom, others target enemy kingdoms only
          const ek = ball.isMerc
            ? kingdoms.filter(k => k.alive)
            : kingdoms.filter(k => k.id !== ball.team && k.alive);
          const tk = ek.length
            ? ek.reduce((a, b) => getDist(ball, a) < getDist(ball, b) ? a : b)
            : null;
          if (tk) {
            tx = tk.x; ty = tk.y;
          } else {
            // No kingdoms left — target nearest enemy ball (including kings)
            const allEnemies = ball.isMerc
              ? balls.filter(b => b !== ball)
              : balls.filter(b => b.team !== ball.team);
            const nearestEnemy = allEnemies.length
              ? allEnemies.reduce((a, b) => getDist(ball, a) < getDist(ball, b) ? a : b)
              : null;
            if (nearestEnemy) { tx = nearestEnemy.x; ty = nearestEnemy.y; }
          }
        }

        const ang = Math.atan2(ty - ball.y, tx - ball.x);
        const wa  = ang + Math.sin(ball.wobble) * 0.10;
        ball.x += Math.cos(wa) * ball.speed;
        ball.y += Math.sin(wa) * ball.speed;
      }
    }

    // ---- SIEGE ENEMY KINGDOM ----
    // Balls stay at kingdom and keep attacking instead of disappearing
    // Clear siege if target kingdom is already dead
    if (ball.siegeTarget !== null) {
      const targetK = kingdoms.find(k => k.id === ball.siegeTarget);
      if (!targetK || !targetK.alive) {
        ball.siegeTarget = null;
        ball.siegeTimer  = 0;
      }
    }
    kingdoms.forEach(k => {
      if (!k.alive) return;
      // Normal balls skip own kingdom, mercs attack all kingdoms
      if (!ball.isMerc && k.id === ball.team) return;
      if (getDist(ball, k) < ball.radius + 34) {
        // Mark this ball as sieging this kingdom
        ball.siegeTarget = k.id;
        ball.siegeTimer += delta;
        // Attack kingdom every 800ms
        if (ball.siegeTimer >= 800) {
          k.hp -= totalDmg(ball) * 0.5;
          ball.hits++;
          checkLevelUp(ball);
          ball.siegeTimer = 0;
          // Kingdom under attack upgrades 6x faster
          k.upgradeTimer += 4800;
          if (k.hp <= 0) {
            // ---- HOOKER TOKEN: last chance — heal to 25% and spawn hooker ----
            if (k.hookerToken) {
              k.hookerToken = false;
              k.hp = Math.floor(k.maxHp * 0.25); // heal to 25%
              const alreadyHasHooker = balls.some(b => b.isHooker && b.team === k.id);
              if (!alreadyHasHooker) spawnHooker(k, speedMult);
            } else {
              k.alive = false;
              k.hp    = 0;
              // ---- SPAWN KING AS LAST STAND ----
              spawnKing(k);
              // Filter out all balls of this team EXCEPT the king just spawned
              balls = balls.filter(b => b.team !== k.id || b.isKing);
            }
          }
        }
      } else if (ball.siegeTarget === k.id) {
        // Ball moved away from kingdom, clear siege
        ball.siegeTarget = null;
        ball.siegeTimer  = 0;
      }
    });

    // Clamp to map
    ball.x = Math.max(MX + 14, Math.min(MX + MW - 14, ball.x));
    ball.y = Math.max(MY + 14, Math.min(MY + MH - 14, ball.y));
  });

  // Remove dead balls — detect knight deaths to trigger rage buff
  const deadKnights = balls.filter(b => b.isKnight && (b.troops <= 0 || b.hp <= 0));
  deadKnights.forEach(dk => {
    const ownerKingdom = kingdoms.find(k => k.id === dk.team);
    if (ownerKingdom && ownerKingdom.alive) {
      ownerKingdom.rageBuff  = true;
      ownerKingdom.rageTimer = 11000;
    }
  });
  // Kings, shields, hookers and MLVL cannons survive as long as hp > 0
  balls = balls.filter(b =>
    (b.isKing || b.isShield || b.isHooker || b.isHorse || b.isWizard || (b.isCannon && b.ballLevel >= 2))
      ? b.hp > 0
      : (b.troops > 0 && b.hp > 0)
  );

  // Tick down rage timers on all kingdoms
  kingdoms.forEach(k => {
    if (k.rageBuff) {
      k.rageTimer -= delta;
      if (k.rageTimer <= 0) {
        k.rageBuff  = false;
        k.rageTimer = 0;
      }
    }
  });

  // Win check — a fallen kingdom's king must also die before they're eliminated
  const alive = kingdoms.filter(k => k.alive);
  kingdoms.filter(k => !k.alive).forEach(k => {
    const kingStillFighting = balls.some(b => b.isKing && b.team === k.id);
    if (!kingStillFighting && alive.length + kingdoms.filter(kk => !kk.alive && balls.some(b => b.isKing && b.team === kk.id)).length === 1) {
      if (alive.length === 1) { gameOver = true; winnerName = alive[0].name; }
    }
  });
  if (alive.length === 1 && !balls.some(b => b.isKing && kingdoms.find(k => k.id === b.team && !k.alive))) {
    gameOver = true; winnerName = alive[0].name;
  }
  if (alive.length === 0) {
    const lastKing = balls.filter(b => b.isKing);
    if (lastKing.length === 1) { gameOver = true; winnerName = CONFIGS[lastKing[0].team].name; }
    else if (lastKing.length === 0) { gameOver = true; winnerName = 'Nobody'; }
  }

  // ---- TORNADO UPDATE ----
  tornadoSpawnTimer -= delta;
  if (tornadoSpawnTimer <= 0) {
    tornadoSpawnTimer = TORNADO_SPAWN_INTERVAL;
    if (tornadoes.length < TORNADO_MAX) spawnTornado();
  }

  tornadoes.forEach(t => {
    t.lifetime  -= delta;
    t.tickTimer += delta;
    t.spinAngle += 0.08;
    t.wobble    += 0.03;

    // Drift randomly — gently change direction over time
    t.driftAngle += (Math.random() - 0.5) * 0.08;
    t.x += Math.cos(t.driftAngle) * t.driftSpeed;
    t.y += Math.sin(t.driftAngle) * t.driftSpeed;

    // Clamp to map
    t.x = Math.max(MX + 30, Math.min(MX + MW - 30, t.x));
    t.y = Math.max(MY + 30, Math.min(MY + MH - 30, t.y));

    // Pull all balls within range toward center
    balls.forEach(ball => {
      const dist = getDist(ball, t);
      if (dist < TORNADO_PULL_RANGE && dist > 0) {
        const ang = Math.atan2(t.y - ball.y, t.x - ball.x);
        const force = TORNADO_PULL_FORCE * (1 - dist / TORNADO_PULL_RANGE);
        ball.x += Math.cos(ang) * force;
        ball.y += Math.sin(ang) * force;
      }
    });

    // Deal 1% max HP damage every 1s to all balls in range
    if (t.tickTimer >= 1000) {
      t.tickTimer = 0;
      balls.forEach(ball => {
        if (getDist(ball, t) < TORNADO_PULL_RANGE) {
          const dmg = Math.max(1, Math.floor(ball.maxHp * 0.01));
          ball.hp -= dmg;
          ball.hp  = Math.max(0, ball.hp);
          updateTroops(ball);
        }
      });
    }
  });

  // Remove expired tornadoes
  tornadoes = tornadoes.filter(t => t.lifetime > 0);

  // ---- TSUNAMI UPDATE ----
  tsunamiSpawnTimer -= delta;
  if (tsunamiSpawnTimer <= 0) {
    tsunamiSpawnTimer = TSUNAMI_SPAWN_INTERVAL;
    if (tsunamis.length < TSUNAMI_MAX) spawnTsunami();
  }

  tsunamis.forEach(t => {
    t.spinAngle += 0.06;
    // Move in fixed direction at speed 4
    t.x += Math.cos(t.angle) * TSUNAMI_SPEED;
    t.y += Math.sin(t.angle) * TSUNAMI_SPEED;

    // Hit any ball in contact — 50% max HP damage, one hit per ball
    balls.forEach(ball => {
      if (!t.hitBalls.has(ball) && getDist(ball, t) < t.radius + ball.radius + 6) {
        const dmg = Math.floor(ball.maxHp * 0.50);
        ball.hp -= dmg;
        ball.hp  = Math.max(0, ball.hp);
        updateTroops(ball);
        t.hitBalls.add(ball);
      }
    });
  });

  // Remove tsunamis that have left the map bounds
  tsunamis = tsunamis.filter(t =>
    t.x > MX - 120 && t.x < MX + MW + 120 &&
    t.y > MY - 120 && t.y < MY + MH + 120
  );

  drawAll();
  updateMusic();
  requestAnimationFrame(update);
}

// ======== DRAWING ========
function drawKnight(ball) {
  const size = ball.radius * 2.8;
  ctx.save();
  ctx.translate(ball.x, ball.y);
  // Slight wobble when fighting
  if (ball.swordSwinging) {
    ctx.rotate(Math.sin(ball.swordAngle) * 0.15);
  }
  ctx.drawImage(
    knightImg,
    -size / 2,
    -size / 2,
    size,
    size
  );
  ctx.restore();
}

// ---- DRAW KING ----
// Colored circle drawn underneath fills the white area of the king image
function drawKing(ball) {
  const size = ball.radius * 3.2;
  ctx.save();
  ctx.translate(ball.x, ball.y);
  if (ball.swordSwinging) {
    ctx.rotate(Math.sin(ball.swordAngle) * 0.12);
  }
  // Kingdom color fills the white body area
  ctx.beginPath();
  ctx.arc(0, ball.radius * 0.15, ball.radius * 0.85, 0, Math.PI * 2);
  ctx.fillStyle = ball.color;
  ctx.fill();
  // King image drawn on top
  ctx.drawImage(kingImg, -size/2, -size/2, size, size);
  ctx.restore();
}

// ---- DRAW SHIELD ----
// Colored circle underneath fills the white area of the shield image
function drawShield(ball) {
  const size = ball.radius * 2.8;
  ctx.save();
  ctx.translate(ball.x, ball.y);
  // Kingdom color circle underneath (fills white area)
  ctx.beginPath();
  ctx.arc(0, 0, ball.radius * 0.88, 0, Math.PI * 2);
  ctx.fillStyle = ball.color;
  ctx.fill();
  // Shield image on top
  ctx.drawImage(shieldImg, -size/2, -size/2, size, size);
  ctx.restore();
}

// ---- DRAW CANNON ----
// Kingdom color fills the black circle part of the cannon image
function drawCannon(ball) {
  const size = ball.radius * 3.5;
  ctx.save();
  ctx.translate(ball.x, ball.y);
  // Angle cannon toward nearest enemy
  const enemies = balls.filter(b => b.team !== ball.team);
  if (enemies.length) {
    const target = enemies.reduce((a, b) => getDist(ball, a) < getDist(ball, b) ? a : b);
    const ang = Math.atan2(target.y - ball.y, target.x - ball.x);
    ctx.rotate(ang);
  }
  // Kingdom color fills the black circle body
  ctx.beginPath();
  ctx.arc(-ball.radius * 0.2, 0, ball.radius * 0.75, 0, Math.PI * 2);
  ctx.fillStyle = ball.color;
  ctx.fill();
  // Cannon image on top
  ctx.drawImage(cannonImg, -size/2, -size/2, size, size);
  ctx.restore();
}

// ---- DRAW RAMMER ----
// Kingdom color fills the hollow center of the rammer image
function drawRammer(ball) {
  const size = ball.radius * 2.8;
  ctx.save();
  ctx.translate(ball.x, ball.y);
  // Rotate toward ram target if charging
  if (ball.currentRamTarget) {
    const ang = Math.atan2(
      ball.currentRamTarget.y - ball.y,
      ball.currentRamTarget.x - ball.x
    );
    ctx.rotate(ang);
  }
  // Kingdom color fills the hollow center
  ctx.beginPath();
  ctx.arc(0, 0, ball.radius * 0.45, 0, Math.PI * 2);
  ctx.fillStyle = ball.color;
  ctx.fill();
  // Rammer image on top
  ctx.drawImage(rammerImg, -size/2, -size/2, size, size);
  ctx.restore();
}

function drawAll() {
  ctx.clearRect(0, 0, W, H);

  // Wood border
  ctx.fillStyle = '#7a5010';
  ctx.fillRect(0, 0, W, H);

  // Parchment tiles
  for (let i = 0; i < MW; i += 36) {
    for (let j = 0; j < MH; j += 36) {
      const even = (Math.floor(i/36) + Math.floor(j/36)) % 2 === 0;
      ctx.fillStyle = even ? '#d4a555' : '#c99848';
      ctx.fillRect(MX + i, MY + j, 36, 36);
    }
  }

  ctx.strokeStyle = '#7a5010'; ctx.lineWidth = 5;
  ctx.strokeRect(MX + 3, MY + 3, MW - 6, MH - 6);

  drawWavyBorder();
  mountains.forEach(m => drawMountain(m.x, m.y));
  trees.forEach(t => drawTree(t.x, t.y));

  // Trails
  balls.forEach(ball => {
    ctx.beginPath();
    ctx.arc(ball.trailX, ball.trailY, ball.radius * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = ball.color + '44';
    ctx.fill();
  });

  kingdoms.forEach(k => drawKingdom(k));

  // ---- TORNADOES ----
  tornadoes.forEach(t => {
    const alpha = Math.min(1, t.lifetime / 2000); // fade out last 2s
    ctx.save();
    ctx.globalAlpha = alpha;

    // Pull range ring — faint dashed circle showing suck zone
    ctx.beginPath();
    ctx.arc(t.x, t.y, TORNADO_PULL_RANGE, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(160,160,160,0.25)';
    ctx.setLineDash([6, 5]);
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.setLineDash([]);

    // Tornado image — rotates over time
    ctx.translate(t.x, t.y);
    ctx.rotate(t.spinAngle);
    const tSize = t.radius * 3.2;
    ctx.drawImage(tornadoImg, -tSize/2, -tSize/2, tSize, tSize);

    ctx.restore();

    // TORNADO label — no rotation, drawn after restore
    const labelAlpha = Math.min(1, t.lifetime / 2000);
    ctx.globalAlpha = labelAlpha;
    ctx.fillStyle    = '#aaaaaa';
    ctx.font         = 'bold 9px Arial';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('TORNADO', t.x, t.y + t.radius * 2.2);
    ctx.globalAlpha = 1;
  });

  // ---- TSUNAMIS ----
  tsunamis.forEach(t => {
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(t.angle - Math.PI * 0.5); // orient in direction of travel
    const tsSize = t.radius * 3.0;
    ctx.drawImage(tsunamiImg, -tsSize/2, -tsSize/2, tsSize, tsSize);
    ctx.restore();
    // TSUNAMI label
    ctx.fillStyle    = '#00ccee';
    ctx.font         = 'bold 10px Arial';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('TSUNAMI', t.x, t.y + t.radius + 12);
  });

  // ---- SHIELDS (drawn between kingdoms and balls) ----
  balls.filter(b => b.isShield).forEach(ball => {
    // MLVL shield — purple double ring with REFLECT label
    if (ball.isMlvlShield) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 14, 0, Math.PI * 2);
      ctx.strokeStyle = '#aa44ffcc';
      ctx.lineWidth   = 4;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 8, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffffff88';
      ctx.lineWidth   = 2;
      ctx.stroke();
    }
    // Elite king shield — gold pulsing ring
    if (ball.isEliteKingShield) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 12, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffdd44cc';
      ctx.lineWidth   = 4;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 18, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffdd4466';
      ctx.lineWidth   = 3;
      ctx.stroke();
    }
    // Emergency shield — red pulsing ring
    if (ball.isEmergencyShield) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 10, 0, Math.PI * 2);
      ctx.strokeStyle = '#ff0000cc';
      ctx.lineWidth   = 4;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 16, 0, Math.PI * 2);
      ctx.strokeStyle = '#ff000066';
      ctx.lineWidth   = 3;
